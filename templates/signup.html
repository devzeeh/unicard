<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/style/index.css">
    <title>Sign Up</title>
</head>

<body>
    <h1>Create an Account</h1>

<form id="signupForm">
    <label for="firstName">First Name: <span class="required">*</span></label>
    <input type="text" id="firstName" name="firstName" autocomplete="given-name" pattern="[A-Za-z ]+"
        onkeypress="return /[a-zA-Z ]/.test(event.key)" required><br><br>

    <label for="lastName">Last Name: <span class="required">*</span></label>
    <input type="text" id="lastName" name="lastName" autocomplete="family-name" pattern="[A-Za-z ]+"
        onkeypress="return /[a-zA-Z ]/.test(event.key)" required><br><br>

    <label for="email">Email: <span class="required">*</span></label>
    <input type="email" id="email" name="email" required><br><br>

    <label for="contactNumber">Contact Number: <span class="required">*</span></label>
    <input type="tel" id="contactNumber" name="contactNumber" inputmode="tel" pattern="[0-9]*"
        maxlength="11" onkeypress="return /[0-9]/.test(event.key)" required><br><br>

    <label for="cardNumber">Card Number: <span class="required">*</span></label>
    <input type="number" id="cardNumber" name="cardNumber" inputmode="numeric" pattern="[0-9]*"
        onkeypress="return /[0-9]/.test(event.key)" required><br><br>

    <label for="password">Password: <span class="required">*</span></label>
    <input type="password" id="password" name="password" required minlength="8"><br><br>

    <p>Already have an account? <a href="/login">Login here</a></p><br>

    <h3 id="apiMessage" style="font-size: large; display: none;"></h3>

    <button type="submit">Sign Up</button>
</form>

    <script>
        const signupForm = document.getElementById('signupForm');
        const apiMessage = document.getElementById('apiMessage');

        signupForm.addEventListener('submit', async function (event) {
            // Prevent the page from reloading
            event.preventDefault();

            // Clear any previous messages
            apiMessage.style.display = 'none';
            apiMessage.textContent = '';
            apiMessage.style.color = 'red'; // Default to red for errors

            // Gather data and format it to match your Go `SignupRequest` struct exactly
            const payload = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                cardNumber: document.getElementById('cardNumber').value,
                password: document.getElementById('password').value,
                email: document.getElementById('email').value,
                contactNumber: document.getElementById('contactNumber').value
            };

            try {
                // Send the POST request to JSON API route (endpoint)
                const response = await fetch('/api/v1/signupauth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                // Parse the JSON response from Go
                const data = await response.json();

                // Handle the response based on the `Success` boolean
                if (!data.success) {
                    // Show the specific error message generated by your Go backend
                    apiMessage.textContent = data.message;
                    apiMessage.style.display = 'block';
                } else {
                    // SUCCESS! 
                    apiMessage.style.color = 'green';
                    apiMessage.textContent = "Account created successfully! Redirecting to login...";
                    apiMessage.style.display = 'block';

                    // Wait 3 seconds so the user can see the success message, then redirect to login
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 3000);
                }

            } catch (error) {
                console.error("Error during signup:", error);
                apiMessage.textContent = "A network error occurred. Please try again.";
                apiMessage.style.display = 'block';
            }
        });
    </script>
</body>

</html>
