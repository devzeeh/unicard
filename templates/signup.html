<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>
    <h1>Create an Account</h1>

    <form id="signupForm">
        <label>First Name:</label>
        <input type="text" id="firstName" required><br><br>

        <label>Last Name:</label>
        <input type="text" id="lastName" required><br><br>

        <label>Email:</label>
        <input type="email" id="email" required><br><br>

        <label>Contact Number:</label>
        <input type="text" id="contactNumber" required><br><br>

        <label>Card Number:</label>
        <input type="text" id="cardNumber" required><br><br>

        <label>Password:</label>
        <input type="password" id="password" required minlength="8"><br><br>
        
        <p>Already have an account? <a href="/login">Login here</a></p><br>
        
        <h3 id="apiMessage" style="font-size: large; display: none;"></h3>
        
        <button type="submit">Sign Up</button>
    </form>

    <script>
        const signupForm = document.getElementById('signupForm');
        const apiMessage = document.getElementById('apiMessage');

        signupForm.addEventListener('submit', async function(event) {
            // 1. Prevent the page from reloading
            event.preventDefault();

            // 2. Clear any previous messages
            apiMessage.style.display = 'none';
            apiMessage.textContent = '';
            apiMessage.style.color = 'red'; // Default to red for errors

            // 3. Gather data and format it to match your Go `SignupRequest` struct exactly
            const payload = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                cardNumber: document.getElementById('cardNumber').value,
                password: document.getElementById('password').value,
                email: document.getElementById('email').value,
                contactNumber: document.getElementById('contactNumber').value
            };

            try {
                // 4. Send the POST request to your new JSON API route
                const response = await fetch('/api/v1/signupauth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                // 5. Parse the JSON response from Go
                const data = await response.json();

                // 6. Handle the response based on the `Success` boolean
                if (!data.success) {
                    // Show the specific error message generated by your Go backend
                    apiMessage.textContent = data.message;
                    apiMessage.style.display = 'block';
                } else {
                    // SUCCESS! 
                    apiMessage.style.color = 'green';
                    apiMessage.textContent = "Account created successfully! Redirecting to login...";
                    apiMessage.style.display = 'block';
                    
                    // Wait 2 seconds so the user can see the success message, then redirect to login
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 2000);
                }

            } catch (error) {
                console.error("Error during signup:", error);
                apiMessage.textContent = "A network error occurred. Please try again.";
                apiMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
