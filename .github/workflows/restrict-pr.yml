name: Enforce PR Flow

on:
  pull_request:
    # Remove "branches: - main" to run script to any Pull Request

jobs:
  check-pr-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Source and Target
        env:
          TARGET_BRANCH: ${{ github.base_ref }}
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          echo "Validating PR from '$SOURCE_BRANCH' into '$TARGET_BRANCH'..."

          if [[ "$TARGET_BRANCH" == "main" ]]; then
            if [[ "$SOURCE_BRANCH" != "development" && "$SOURCE_BRANCH" != *"-alpha"* && "$SOURCE_BRANCH" != *"-beta"* && "$SOURCE_BRANCH" != *"-rc"* ]]; then
              echo "ERROR: Direct merges into 'main' are not allowed from '$SOURCE_BRANCH'."
              echo "Only 'development', '-alpha', '-beta', or '-rc' branches are permitted."
              exit 1
            fi
          fi

          if [[ "$TARGET_BRANCH" == *"-alpha"* || "$TARGET_BRANCH" == *"-beta"* || "$TARGET_BRANCH" == *"-rc"* ]]; then
            if [[ "$SOURCE_BRANCH" != "development" && "$SOURCE_BRANCH" != *"-alpha"* && "$SOURCE_BRANCH" != *"-beta"* && "$SOURCE_BRANCH" != *"-rc"* ]]; then
              echo "ERROR: '$SOURCE_BRANCH' cannot merge directly into '$TARGET_BRANCH'."
              echo "Testing branches only accept merges from 'development' or other testing branches."
              exit 1
            fi
          fi

          echo "Validation passed! PR flow is correct."

  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -race -cover
