<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayCard - Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <script src="../static/javascript/tailwind-config.js"></script>
</head>

<body class="font-sans antialiased text-gray-900 bg-gray-100">

    <div class="flex h-screen bg-gray-100">
        <!-- Sidebar Navigation -->
        <!-- Sidebar Toggle Button -->
        <button id="menu-toggle-button"
            class="p-4 text-gray-600 hover:text-gray-900 fixed top-4 left-4 z-40 transition-all duration-200 ease-in-out">
            <!-- Hamburger Icon (Open) -->
            <svg id="icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
            <!-- Close Icon (X) -->
            <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>

        <!-- Sidebar -->
        {{template "customer_sidebar" .}}

        <!-- Main Content Area -->
        <div id="main-content" class="flex-1 flex flex-col overflow-hidden transition-all duration-200 ease-in-out">
            <!-- Header -->
            <header
                class="flex items-center justify-between h-16 px-6 py-4 bg-white border-b border-gray-200 md:justify-end">
                <div class="w-10 h-10"></div>

                <div class="flex items-center">
                    <span class="mr-3 font-medium hidden md:block">Welcome, <span id="user-full-name">User</span></span>

                    <!-- PROFILE DROPDOWN -->
                    <div class="relative">
                        <!-- Profile Avatar Button -->
                        <button id="profile-avatar-button"
                            class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold cursor-pointer ring-2 ring-transparent hover:ring-blue-300 transition-all duration-150">
                            <span id="user-initials">U</span>
                        </button>

                        <!-- Dropdown Menu -->
                        <div id="profile-dropdown-menu"
                            class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-gray-200 z-50">
                            <div class="py-1">
                                <a href="/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <i class="fas fa-user -alt w-6 h-6 text-center text-gray-400"></i>
                                    <span class="ml-3">Profile</span>
                                </a>
                                <a href="/settings" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <i class="fas fa-gear -alt w-6 h-6 text-center text-gray-400"></i>
                                    <span class="ml-3">Settings</span>
                                </a>
                                <div class="border-t border-gray-100"></div>
                                <button id="profile-logout-button"
                                    class="w-full text-left block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
                                    <i class="fas fa-sign-out -alt w-6 h-6 text-center text-gray-400"></i>
                                    <span class="ml-3">Sign Out</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main content -->
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6 md:p-8">
                <div class="max-w-7xl mx-auto">
                    <!-- Page Title -->
                    <h1 class="text-3xl font-bold text-gray-900">Transaction History</h1>

                    <!-- Filters Section -->
                    <section aria-label="Transaction Filters" class="mt-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <!-- Date Range Filter -->
                            <div>
                                <label for="date-range" class="block text-sm font-medium text-gray-700">Date
                                    Range</label>
                                <input type="date" name="date-range" id="date-range"
                                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                            </div>
                            <!-- Transaction Type Filter -->
                            <div>
                                <label for="transaction-type"
                                    class="block text-sm font-medium text-gray-700">Type</label>
                                <select id="transaction-type" name="transaction-type"
                                    class="mt-1 block w-full px-3 py-2 border border-gray-300 bg-white rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                                    <option>All Types</option>
                                    <option>Payment</option>
                                    <option>Top-up</option>
                                    <option>Refund</option>
                                </select>
                            </div>
                            <!-- Search Button -->
                            <div class="self-end">
                                <button
                                    class="w-full md:w-auto flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700">
                                    Apply Filters
                                </button>
                            </div>
                        </div>
                    </section>

                    <!-- Transactions Table Section -->
                    <section class="mt-8">
                        <div class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
                            <table class="min-w-full">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th scope="col"
                                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            Date
                                        </th>
                                        <th scope="col"
                                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            Description
                                        </th>
                                        <th scope="col"
                                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            Type
                                        </th>
                                        <th scope="col"
                                            class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            Amount
                                        </th>
                                        <th scope="col"
                                            class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            Status
                                        </th>
                                    </tr>
                                </thead>
                                <tbody id="transactions-table-body" class="divide-y divide-gray-200">
                                    <!-- Skeletons while loading -->
                                    <tr>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-24 animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-48 animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-20 animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-16 ml-auto animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-16 ml-auto animate-pulse"></div></td>
                                    </tr>
                                    <tr>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-24 animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-48 animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-20 animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-16 ml-auto animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-16 ml-auto animate-pulse"></div></td>
                                    </tr>
                                    <tr>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-24 animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-48 animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-20 animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-16 ml-auto animate-pulse"></div></td>
                                        <td class="px-6 py-4 whitespace-nowrap"><div class="h-4 bg-gray-200 rounded w-16 ml-auto animate-pulse"></div></td>
                                    </tr>
                                </tbody>
                            </table>

                            <!-- Pagination -->
                            <nav class="bg-white px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6"
                                aria-label="Pagination">
                                <div class="hidden sm:block">
                                    <p class="text-sm text-gray-700">
                                        Showing
                                        <span class="font-medium">1</span>
                                        to
                                        <span class="font-medium">3</span>
                                        of
                                        <span class="font-medium">3</span>
                                        results
                                    </p>
                                </div>
                                <div class="flex-1 flex justify-between sm:justify-end">
                                    <a href="#"
                                        class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                                        Previous
                                    </a>
                                    <a href="#"
                                        class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                                        Next
                                    </a>
                                </div>
                            </nav>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <!-- Mobile sidebar overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 z-20 bg-black bg-opacity-50 hidden md:hidden"></div>

    <!-- Logout Confirmation Modal -->
    <div id="logout-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50 transition-opacity duration-300 ease-in-out">
        <!-- Modal Content -->
        <div class="bg-white w-full max-w-md p-6 rounded-xl shadow-xl border border-gray-200 transform transition-all duration-300 ease-in-out scale-95 opacity-0"
            id="logout-modal-content">
            <!-- Modal Header -->
            <div class="flex items-start justify-between">
                <h3 class="text-2xl font-bold text-gray-900">Confirm Logout</h3>
                <button id="modal-close-button" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <!-- Modal Body -->
            <div class="mt-4">
                <p class="text-base text-gray-600">
                    Are you sure you want to log out of your PayCard account?
                </p>
            </div>
            <!-- Modal Footer -->
            <div class="mt-6 flex justify-end space-x-4">
                <button id="modal-cancel-button"
                    class="px-6 py-2 text-base font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-100">
                    Cancel
                </button>
                <button id="modal-confirm-logout-button"
                    class="px-6 py-2 text-base font-medium text-white bg-red-600 rounded-lg hover:bg-red-700">
                    Logout
                </button>
            </div>
        </div>
    </div>

    <script src="/assets/js/dashboard.js" defer></script>
    <script src="/assets/js/transaction.js" defer></script>
</body>

</html>
