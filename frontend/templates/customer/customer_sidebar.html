{{define "customer_sidebar"}}
<aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-40 w-60 bg-white border-r border-slate-200/60 flex flex-col transition-transform duration-300 ease-in-out -translate-x-full md:translate-x-0">
    
    <!-- Logo -->
    <div class="flex items-center h-16 px-5 border-b border-gray-200">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-600 to-violet-600 flex items-center justify-center shadow-md shadow-violet-500/30">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
        </div>
        <span class="ml-2.5 text-lg font-bold tracking-tight text-slate-900">Uni<span class="text-violet-600">Card</span></span>
    </div>

    <!-- Navigation Links -->
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto" style="max-height: calc(100vh - 160px);">
        <div class="pb-1.5 pl-1">
            <p class="text-[11px] font-semibold tracking-wider text-slate-400 uppercase">Core System</p>
        </div>

        <a href="/u/{{.Username}}/dashboard" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" /></svg>
            <span class="ml-2.5">Dashboard</span>
        </a>
        <a href="/u/{{.Username}}/transaction" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5" /></svg>
            <span class="ml-2.5">Transactions</span>
        </a>
        <a href="/u/{{.Username}}/card" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Z" /></svg>
            <span class="ml-2.5">My Card</span>
        </a>
        <a href="/u/{{.Username}}/topup" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 19.5 15-15m0 0H8.25m11.25 0v11.25" /></svg>
            <span class="ml-2.5">Top Up</span>
        </a>
        
        <div class="pt-4 pb-1.5 pl-1">
            <hr class="border-slate-100 mb-4">
            <p class="text-[11px] font-semibold tracking-wider text-slate-400 uppercase">Account</p>
        </div>
        
        <a href="/u/{{.Username}}" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
            <span class="ml-2.5">Profile</span>
        </a>
        <a href="/u/{{.Username}}/settings" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" /></svg>
            <span class="ml-2.5">Settings</span>
        </a>
    </nav>

    <!-- Logout -->
    <div class="p-3 border-t border-slate-100">
        <button id="logout-button" class="group w-full flex items-center px-3 py-2 text-sm font-medium text-red-600 hover:text-red-700 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-red-600"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" /></svg>
            <span class="ml-2.5">Logout</span>
        </button>
    </div>
</aside>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const currentPath = window.location.pathname;
        const links = document.querySelectorAll('#sidebar .sidebar-link');
        
        let activeLink = null;
        let maxLength = 0;

        // Find the most specific matching link
        links.forEach(link => {
            const linkPath = link.getAttribute('href');
            if (currentPath.startsWith(linkPath) && linkPath.length > maxLength) {
                // To prevent '/faith' matching '/faith/transaction' and thinking they are both valid matches,
                // we ensure exact match or match with trailing slash logic.
                if (currentPath === linkPath || currentPath.startsWith(linkPath + '/')) {
                    activeLink = link;
                    maxLength = linkPath.length;
                }
            }
        });

        if (activeLink) {
            // Remove inactive classes
            activeLink.className = activeLink.className.replace('text-slate-600', 'text-white')
                                     .replace('hover:text-slate-900', '')
                                     .replace('hover:bg-slate-50', '')
                                     .replace('transition-colors', '');
            
            // Add active classes
            activeLink.classList.add('bg-blue-600', 'active-link');
            
            const svg = activeLink.querySelector('svg');
            if (svg) {
                svg.className = svg.className.replace('text-slate-400', 'text-white')
                                             .replace('group-hover:text-slate-600', '')
                                             .replace('transition-colors', '');
            }
        }
    });
</script>
{{end}}
