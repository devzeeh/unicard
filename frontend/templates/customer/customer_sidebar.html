{{define "customer_sidebar"}}
<aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-white/80 backdrop-blur-xl border-r border-slate-200/60 transform -translate-x-full flex flex-col transition-transform duration-300 ease-in-out">
    
    <!-- Logo -->
    <div class="flex items-center h-24 px-8 border-b border-slate-100">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-600 to-violet-600 flex items-center justify-center shadow-lg shadow-violet-500/30">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
        </div>
        <span class="ml-3 text-2xl font-bold tracking-tight text-slate-900">Uni<span class="text-violet-600">Card</span></span>
    </div>

    <!-- Navigation Links -->
    <nav class="flex-1 px-4 py-8 space-y-2 overflow-y-auto">
        <a href="/{{.Username}}" class="sidebar-link group flex items-center px-4 py-3.5 text-sm font-semibold text-white bg-slate-900 rounded-2xl shadow-md">
            <i class="fas fa-grid-2 w-6 text-center text-violet-400"></i>
            <span class="ml-3">Dashboard</span>
        </a>
        <a href="/{{.Username}}/transaction" class="sidebar-link group flex items-center px-4 py-3.5 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100/80 rounded-2xl">
            <i class="fas fa-arrow-right-arrow-left w-6 text-center text-slate-400 group-hover:text-violet-600 transition-colors"></i>
            <span class="ml-3">Transactions</span>
        </a>
        <a href="/{{.Username}}/card" class="sidebar-link group flex items-center px-4 py-3.5 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100/80 rounded-2xl">
            <i class="fas fa-credit-card w-6 text-center text-slate-400 group-hover:text-violet-600 transition-colors"></i>
            <span class="ml-3">My Card</span>
        </a>
        <a href="/{{.Username}}/topup" class="sidebar-link group flex items-center px-4 py-3.5 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100/80 rounded-2xl">
            <i class="fas fa-arrow-up-right-dots w-6 text-center text-slate-400 group-hover:text-violet-600 transition-colors"></i>
            <span class="ml-3">Top Up</span>
        </a>
        
        <div class="pt-6 pb-2">
            <p class="px-4 text-xs font-bold tracking-wider text-slate-400 uppercase">Account</p>
        </div>
        
        <a href="/{{.Username}}/profile" class="sidebar-link group flex items-center px-4 py-3.5 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100/80 rounded-2xl">
            <i class="fas fa-user w-6 text-center text-slate-400 group-hover:text-violet-600 transition-colors"></i>
            <span class="ml-3">Profile</span>
        </a>
        <a href="/{{.Username}}/settings" class="sidebar-link group flex items-center px-4 py-3.5 text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100/80 rounded-2xl">
            <i class="fas fa-sliders w-6 text-center text-slate-400 group-hover:text-violet-600 transition-colors"></i>
            <span class="ml-3">Settings</span>
        </a>
    </nav>

    <!-- Logout -->
    <div class="p-4 border-t border-slate-100">
        <button id="logout-button" class="group w-full flex items-center px-4 py-3.5 text-sm font-medium text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-2xl transition-all">
            <i class="fas fa-arrow-right-from-bracket w-6 text-center text-slate-400 group-hover:text-red-500"></i>
            <span class="ml-3">Log Out</span>
        </button>
    </div>
</aside>
{{end}}
