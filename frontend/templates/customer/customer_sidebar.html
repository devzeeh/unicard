{{define "customer_sidebar"}}
<aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-40 w-64 bg-white border-r border-gray-100 flex flex-col transition-transform duration-300 ease-in-out -translate-x-full md:translate-x-0 h-screen sticky top-0 shadow-sm overflow-y-auto">
    
    <!-- Logo -->
    <div class="flex-shrink-0 flex items-center px-6 py-5 border-b border-gray-100 sticky top-0 bg-white z-20">
        <div class="w-8 h-8 rounded-lg bg-gray-900 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H7a3 3 0 00-3 3v8a3 3 0 003 3z">
                </path>
            </svg>
        </div>
        <span class="ml-3 text-xl font-bold text-gray-900 tracking-tight">UniCard</span>
    </div>

    <!-- Navigation Links -->
    <nav class="mt-6 px-3 pb-4 space-y-1">
        <p class="px-3 text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-2">Core System</p>

        <a href="/u/{{.Username}}/dashboard" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-3 text-gray-400 group-hover:text-gray-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" /></svg>
            <span>Dashboard</span>
        </a>
        <a href="/u/{{.Username}}/transaction" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-3 text-gray-400 group-hover:text-gray-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5" /></svg>
            <span>Transactions</span>
        </a>
        <a href="/u/{{.Username}}/card" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-3 text-gray-400 group-hover:text-gray-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Z" /></svg>
            <span>My Card</span>
        </a>
        <a href="/u/{{.Username}}/topup" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-3 text-gray-400 group-hover:text-gray-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 19.5 15-15m0 0H8.25m11.25 0v11.25" /></svg>
            <span>Top Up</span>
        </a>
        
        <div class="pt-4 pb-2 mt-4 border-t border-gray-100">
            <p class="px-3 text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-2">Account</p>
        </div>
        
        <a href="/u/{{.Username}}" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-3 text-gray-400 group-hover:text-gray-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
            <span>Profile</span>
        </a>
        <a href="/u/{{.Username}}/settings" class="sidebar-link group flex items-center px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-3 text-gray-400 group-hover:text-gray-600 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" /></svg>
            <span>Settings</span>
        </a>
    </nav>

    <!-- Logout -->
    <div class="p-3 border-t border-gray-100 sticky bottom-0 bg-white z-20">
        <button id="logout-button" class="group w-full flex items-center px-3 py-2 text-sm font-medium text-red-600 hover:text-red-700 hover:bg-red-50 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-3 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" /></svg>
            <span>Logout</span>
        </button>
    </div>
</aside>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const currentPath = window.location.pathname;
        const links = document.querySelectorAll('#sidebar .sidebar-link');
        
        let activeLink = null;
        let maxLength = 0;

        // Find the most specific matching link
        links.forEach(link => {
            const linkPath = link.getAttribute('href');
            if (currentPath.startsWith(linkPath) && linkPath.length > maxLength) {
                // To prevent '/faith' matching '/faith/transaction' and thinking they are both valid matches,
                // we ensure exact match or match with trailing slash logic.
                if (currentPath === linkPath || currentPath.startsWith(linkPath + '/')) {
                    activeLink = link;
                    maxLength = linkPath.length;
                }
            }
        });

        if (activeLink) {
            // Remove inactive classes
            activeLink.className = activeLink.className.replace('text-gray-600', 'text-blue-700')
                                     .replace('hover:text-gray-900', '')
                                     .replace('hover:bg-gray-50', '')
                                     .replace('transition-colors', '');
            
            // Add active classes
            activeLink.classList.add('bg-blue-50', 'active-link');
            
            const svg = activeLink.querySelector('svg');
            if (svg) {
                svg.className = svg.className.replace('text-gray-400', 'text-blue-700')
                                             .replace('group-hover:text-gray-600', '')
                                             .replace('transition-colors', '');
            }
        }
    });
</script>

<!-- Logout Confirmation Modal (Injected with Sidebar) -->
<div id="logout-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50 transition-opacity duration-300 ease-in-out opacity-0">
    <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-lg border border-gray-100 transform transition-all duration-300 ease-in-out scale-95 opacity-0" id="logout-modal-content">
        <div class="flex items-start justify-between">
            <h3 class="text-2xl font-bold text-gray-900">Confirm Logout</h3>
            <button id="modal-close-button" class="text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="mt-4"><p class="text-base text-gray-600">Are you sure you want to log out of your account?</p></div>
        <div class="mt-6 flex justify-end space-x-4">
            <button id="modal-cancel-button" class="px-6 py-2 text-base font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 active:scale-[0.98]">Cancel</button>
            <button id="modal-confirm-logout-button" class="px-6 py-2 text-base font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 active:scale-[0.98]">Logout</button>
        </div>
    </div>
</div>
{{end}}
