<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayCard - My Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="../assets/js/tailwind-config.js"></script>
</head>

<body class="font-sans antialiased text-gray-900 bg-gray-100">
    <!-- Fixed Top Navigation Bar -->
    <header
        class="fixed top-0 left-0 right-0 z-30 flex items-center justify-between h-16 px-4 md:px-6 bg-white border-b border-gray-200 shadow-sm">
        <div class="flex items-center">
            <!-- Sidebar Toggle Button -->
            <button id="menu-toggle-button"
                class="p-2 text-gray-600 hover:text-gray-900 transition-all duration-200 ease-in-out">
                <svg id="icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7">
                    </path>
                </svg>
                <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>

            <!-- Logo -->
            <a href="/dashboard" class="flex items-center ml-4">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H7a3 3 0 00-3 3v8a3 3 0 003 3z">
                    </path>
                </svg>
                <span class="ml-2 text-xl font-bold text-gray-900 hidden sm:block">PayCard</span>
            </a>
        </div>

        <!-- Profile Avatar & Dropdown (On the right) -->
        <div class="flex items-center">
            <span class="mr-3 font-medium hidden md:block">Welcome, <span id="user-full-name">User</span></span>
            <div class="relative">
                <button id="profile-avatar-button"
                    class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold cursor-pointer ring-2 ring-transparent hover:ring-blue-300 transition-all duration-150">
                    <span id="user-initials">U</span>
                </button>
                <div id="profile-dropdown-menu"
                    class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-gray-200 z-50">
                    <div class="py-1">
                        <a href="/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
                            <span class="ml-3">Profile</span>
                        </a>
                        <a href="/settings" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.99l1.004.828c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
                            <span class="ml-3">Settings</span>
                        </a>
                        <div class="border-t border-gray-100"></div>
                        <button id="profile-logout-button"
                            class="w-full text-left block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" /></svg>
                            <span class="ml-3">Sign Out</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Layout Container -->
    <div class="relative w-full h-screen pt-16"> <!-- pt-16 = height of header -->

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-20 flex-shrink-0 w-64 px-8 py-4 bg-white border-r border-gray-200 transform -translate-x-full 
                   transition-transform duration-200 ease-in-out pt-20">
            <!-- pt-20 to offset header height -->

            <!-- Navigation Links -->
            <nav class="mt-0">
                <ul class="space-y-2">
                    <!-- Dashboard -->
                    <li>
                        <a href="/dashboard"
                            class="group flex items-center px-4 py-3 text-base font-medium text-gray-700 hover:bg-gray-100 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400 group-hover:text-blue-500 transition duration-300 cursor-pointer"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
                            <span
                                class="ml-3 group-hover:text-blue-500 transition duration-300 cursor-pointer">Dashboard</span>
                        </a>
                    </li>
                    <!-- Transactions -->
                    <li>
                        <a href="/transaction"
                            class="group flex items-center px-4 py-3 text-base font-medium text-gray-700 hover:bg-gray-100 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400 group-hover:text-blue-500 transition duration-300 cursor-pointer"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5" /></svg>
                            <span
                                class="ml-3 group-hover:text-blue-500 transition duration-300 cursor-pointer">Transactions</span>
                        </a>
                    </li>
                    <!-- My Card -->
                    <li>
                        <a href="/card"
                            class="group flex items-center px-4 py-3 text-base font-medium text-gray-700 hover:bg-gray-100 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400 group-hover:text-blue-500 transition duration-300 cursor-pointer"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Z" /></svg>
                            <span class="ml-3 group-hover:text-blue-500 transition duration-300 cursor-pointer">My
                                Card</span>
                        </a>
                    </li>
                    <!-- Profile -->
                    <li>
                        <a href="/profile"
                            class="group flex items-center px-4 py-3 text-base font-medium text-gray-700 hover:bg-gray-100 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400 group-hover:text-blue-500 transition duration-300 cursor-pointer"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
                            <span
                                class="ml-3 group-hover:text-blue-500 transition duration-300 cursor-pointer">Profile</span>
                        </a>
                    </li>
                    <!-- Top Up (Active Link) -->
                    <li>
                        <a href="/topup"
                            class="group flex items-center px-4 py-3 text-base font-medium text-white bg-blue-600 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a2.25 2.25 0 0 0-2.25-2.25H15a3 3 0 1 1 0-6h3.75m-9 0H4.5A2.25 2.25 0 0 0 2.25 4.5v15A2.25 2.25 0 0 0 4.5 21h15a2.25 2.25 0 0 0 2.25-2.25V12Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 11.25h.008v.008H15v-.008Z" /></svg>
                            <span class="ml-3">Top Up</span>
                        </a>
                    </li>
                    <div class="w-full  border-t border-gray-200"></div>
                    <!-- Settings -->
                    <li>
                        <a href="/settings"
                            class="group flex items-center px-4 py-3 text-base font-medium text-gray-700 hover:bg-gray-100 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400 group-hover:text-blue-500 transition duration-300 cursor-pointer"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.99l1.004.828c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
                            <span
                                class="ml-3 group-hover:text-blue-500 transition duration-300 cursor-pointer">Settings</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Logout -->
            <footer class="absolute bottom-0 left-0 w-full p-4 border-t border-gray-200">
                <button id="logout-button"
                    class="group w-full flex items-center px-4 py-3 text-base font-medium text-gray-700 hover:bg-gray-100 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400 group-hover:text-red-500 transition duration-300 cursor-pointer"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" /></svg>
                    <span class="ml-3 group-hover:text-red-500 transition duration-300 cursor-pointer">Logout</span>
                </button>
            </footer>
        </aside>

        <!-- Main Content Area -->
        <main id="main-content"
            class="w-full h-full overflow-y-auto bg-gray-100 transition-all duration-200 ease-in-out">
            <!-- This main tag will have its margin-left toggled by JS -->
            <div class="p-6 md:p-8">
                <div class="max-w-7xl mx-auto">
                    <!-- Page Title -->
                    <h1 class="text-3xl font-bold text-gray-900">Top Up Your Card</h1>

                    <!-- Page Content -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-6">

                        <!-- Column 1: Top Up Form -->
                        <section class="lg:col-span-2">
                            <form id="topup-form"
                                class="bg-white p-6 md:p-8 rounded-xl shadow-lg border border-gray-200" novalidate>
                                <h2 class="text-2xl font-bold text-gray-900">Add Balance</h2>

                                <!-- Amount Input -->
                                <div class="mt-6">
                                    <label for="amount" class="block text-sm font-medium text-black">Amount
                                        (PHP)</label>
                                    <div class="mt-1 relative">
                                        <input type="number" name="amount" id="amount"
                                            class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-2xl font-bold"
                                            placeholder="0.00" required>
                                    </div>
                                    <div id="amount-error" class="text-xs text-red-600 mt-1 hidden"></div>
                                </div>

                                <!-- Quick Amounts -->
                                <div class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3">
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100">50</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100">100</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100">150</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100">250</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100">200</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100">500</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100">700</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100">1000</button>
                                </div>

                                <!-- Payment Method -->
                                <div class="mt-6">
                                    <h3 class="text-lg font-medium text-black">Select Payment Method</h3>
                                    <div class="mt-4 space-y-4">
                                        <!-- Stripe (Credit Card) -->
                                        <label for="payment-stripe"
                                            class="flex items-center p-4 border border-gray-300 rounded-lg has-[:checked]:bg-blue-50 has-[:checked]:border-blue-500 cursor-pointer hover:bg-gray-100">
                                            <input type="radio" id="payment-stripe" name="payment_method" value="stripe"
                                                class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                            <div class="ml-3 flex justify-between items-center w-full ">
                                                <span class="text-sm font-medium text-gray-900 ">Credit / Debit
                                                    Card</span>
                                                <div class="flex space-x-1">
                                                    <i class="fab fa-cc-visa text-2xl text-gray-500"></i>
                                                    <i class="fab fa-cc-mastercard text-2xl text-gray-500"></i>
                                                </div>
                                            </div>
                                        </label>
                                        <!-- GCash (E-Wallet)
                                        <label for="payment-gcash"
                                            class="flex items-center p-4 border border-gray-300 rounded-lg has-[:checked]:bg-blue-50 has-[:checked]:border-blue-500 cursor-pointer hover:bg-gray-100">
                                            <input type="radio" id="payment-gcash" name="payment_method" value="gcash"
                                                class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                            <div class="ml-3 flex justify-between items-center w-full">
                                                <span class="text-sm font-medium text-gray-900">GCash</span>
                                                <img src="https://placehold.co/40x25/0070FF/FFFFFF?text=G" alt="GCash"
                                                    class="h-6 rounded">
                                            </div>
                                        </label> -->
                                        <!-- GCash (E-Wallet) - DISABLED -->
                                        <label for="payment-gcash"
                                            class="flex items-center p-4 border border-gray-300 rounded-lg cursor-not-allowed opacity-50">
                                            <input type="radio" id="payment-gcash" name="payment_method" value="gcash"
                                                class="h-4 w-4 text-blue-600 border-gray-300" disabled>
                                            <div class="ml-3 flex justify-between items-center w-full">
                                                <span class="text-sm font-medium text-gray-900">GCash</span>
                                                <span
                                                    class="text-xs font-semibold bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full">Coming
                                                    Soon</span>
                                            </div>
                                        </label>
                                        <!-- Bank Transfer - DISABLED -->
                                        <label for="payment-bank"
                                            class="flex items-center p-4 border border-gray-300 rounded-lg cursor-not-allowed opacity-50">
                                            <input type="radio" id="payment-bank" name="payment_method" value="bank"
                                                class="h-4 w-4 text-blue-600 border-gray-300" disabled>
                                            <div class="ml-3 flex justify-between items-center w-full">
                                                <span class="text-sm font-medium text-gray-900">Online Bank
                                                    Transfer</span>
                                                <span
                                                    class="text-xs font-semibold bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full">Coming
                                                    Soon</span>
                                            </div>
                                        </label>
                                        <!-- Bank Transfer
                                        <label for="payment-bank"
                                            class="flex items-center p-4 border border-gray-300 rounded-lg has-[:checked]:bg-blue-50 has-[:checked]:border-blue-500 cursor-pointer hover:bg-gray-100">
                                            <input type="radio" id="payment-bank" name="payment_method" value="bank"
                                                class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                            <div class="ml-3 flex justify-between items-center w-full">
                                                <span class="text-sm font-medium text-gray-900">Online Bank
                                                    Transfer</span>
                                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="text-xl text-gray-500"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0 0 12 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75Z" /></svg>
                                            </div>
                                        </label> -->
                                    </div>
                                </div>

                                <!-- Submit Button -->
                                <div class="mt-8">
                                    <button id="topup-submit-btn" type="submit"
                                        class="w-full px-6 py-4 bg-blue-600 text-white text-lg font-medium rounded-lg shadow-sm hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
                                        disabled>
                                        Top Up Now
                                    </button>
                                </div>
                            </form>
                        </section>

                        <!-- Column 2: Current Balance -->
                        <section class="lg:col-span-1">
                            <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
                                <h2 class="text-2xl font-bold text-gray-900">Your Balance</h2>
                                <div class="mt-4">
                                    <p class="text-sm font-medium text-gray-500">Current Balance</p>
                                    <p class="text-4xl font-bold text-gray-900 mt-1">
                                        <span id="user-balance"><div class="h-10 bg-gray-200 rounded w-32 inline-block animate-pulse"></div></span>
                                    </p>
                                </div>
                                <div class="mt-4">
                                    <p class="text-sm font-medium text-gray-500">Loyalty Points</p>
                                    <p class="text-2xl font-bold text-green-600 mt-1">
                                        <span id="user-loyalty-points"><div class="h-8 bg-gray-200 rounded w-24 inline-block animate-pulse"></div></span>
                                    </p>
                                </div>
                            </div>
                        </section>

                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile sidebar overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 z-10 bg-black bg-opacity-50 hidden md:hidden"></div>

    <!-- Logout Confirmation Modal -->
    <div id="logout-modal"

        <div class="bg-white w-full max-w-md p-6 rounded-xl shadow-xl border border-gray-200 transform transition-all duration-300 ease-in-out scale-95 opacity-0"

            <div class="flex items-start justify-between">
                <h3 class="text-2xl font-bold text-gray-900">Confirm Logout</h3>
                <button id="modal-close-button" class="text-gray-400 hover:text-gray-600">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">

                    </svg>
                </button>
            </div>
            <!-- Modal Body -->
            <div class="mt-4">

            </div>

            <div class="mt-6 flex justify-end space-x-4">
                <button id="modal-cancel-button"
                    class="px-6 py-2 text-base font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">

                </button>
                <button id="modal-confirm-logout-button"

                </button>
            </div>
        </div>
