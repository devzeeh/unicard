<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayCard - Top Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="/assets/style/tailwind.js"></script>
</head>

<body class="font-sans antialiased text-gray-900 bg-gray-100">

    <div class="flex h-screen bg-gray-100 overflow-hidden">
        <!-- Sidebar -->
        {{template "customer_sidebar" .}}

        <!-- Main Content Area -->
        <div id="main-content" class="flex-1 flex flex-col overflow-hidden transition-all duration-200 ease-in-out">
            <!-- Header -->
            <header class="flex items-center justify-between md:justify-end h-16 px-5 sm:px-6 py-4 bg-white border-b border-gray-200 z-20 shrink-0">
                <!-- Mobile Menu Button (Left) -->
                <div class="flex items-center md:hidden">
                    <button id="mobile-menu-button" class="text-gray-500 hover:text-gray-700 focus:outline-none">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <span class="ml-3 text-lg font-bold tracking-tight text-slate-900">Uni<span class="text-violet-600">Card</span></span>
                </div>

                <!-- Profile Dropdown (Right) -->
                <div class="flex items-center">
                    <span class="mr-3 font-medium hidden md:block">Welcome, <span id="user-full-name">...</span></span>

                    <!-- PROFILE DROPDOWN -->
                    <div class="relative">
                        <button id="profile-avatar-button"
                            class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold cursor-pointer ring-2 ring-transparent hover:ring-blue-300 transition-all duration-150">
                            <span id="user-initials">U</span>
                        </button>

                        <!-- Dropdown Menu -->
                        <div id="profile-dropdown-menu"
                            class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-gray-200 z-50">
                            <div class="py-1">
                                <a href="/u/{{.Username}}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400 inline-block align-middle"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
                                    <span class="ml-3 align-middle">Profile</span>
                                </a>
                                <a href="/u/{{.Username}}/settings" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400 inline-block align-middle"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" /></svg>
                                    <span class="ml-3 align-middle">Settings</span>
                                </a>
                                <div class="border-t border-gray-100"></div>
                                <button id="profile-logout-button"
                                    class="w-full text-left block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-center text-gray-400 inline-block align-middle"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" /></svg>
                                    <span class="ml-3 align-middle">Sign Out</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6 md:p-8">
                <div class="max-w-7xl mx-auto">
                    <!-- Page Title -->
                    <h1 class="text-3xl font-bold text-gray-900 mb-8">Top Up Your Card</h1>

                    <!-- Page Content -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-6">

                        <!-- Column 1: Top Up Form -->
                        <section class="lg:col-span-2">
                            <form id="topup-form"
                                class="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100" novalidate>
                                <h2 class="text-2xl font-bold text-gray-900">Add Balance</h2>

                                <!-- Amount Input -->
                                <div class="mt-6">
                                    <label for="amount" class="block text-sm font-medium text-black">Amount (PHP)</label>
                                    <div class="mt-1 relative">
                                        <input type="number" name="amount" id="amount" min="50" step="0.01"
                                            class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-2xl font-bold"
                                            placeholder="0.00" required>
                                    </div>
                                    <div id="amount-error" class="text-xs text-red-600 mt-1 hidden"></div>
                                </div>

                                <!-- Quick Amounts -->
                                <div class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3">
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100 transition-colors">50</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100 transition-colors">100</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100 transition-colors">150</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100 transition-colors">250</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100 transition-colors">200</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100 transition-colors">500</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100 transition-colors">700</button>
                                    <button type="button"
                                        class="quick-amount-btn w-full py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-blue-100 transition-colors">1000</button>
                                </div>

                                <!-- Total Breakdown -->
                                <div id="breakdown-container" class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200 hidden">
                                    <div class="flex justify-between text-sm text-gray-600 mb-2">
                                        <span>Top-up Amount</span>
                                        <span>₱<span id="breakdown-amount">0.00</span></span>
                                    </div>
                                    <div class="flex justify-between text-sm text-gray-600 mb-2">
                                        <span>Convenience Fee</span>
                                        <span>₱15.00</span>
                                    </div>
                                    <div class="border-t border-gray-200 my-2"></div>
                                    <div class="flex justify-between font-bold text-gray-900 text-lg">
                                        <span>Total to Pay</span>
                                        <span>₱<span id="breakdown-total">0.00</span></span>
                                    </div>
                                </div>

                                <!-- Payment Method -->
                                <div class="mt-8">
                                    <h3 class="text-lg font-medium text-black">Select Payment Method</h3>
                                    <div class="mt-4 space-y-4">
                                        <!-- Stripe (Credit Card) -->
                                        <label for="payment-stripe"
                                            class="flex items-center p-4 border border-gray-300 rounded-lg has-[:checked]:bg-blue-50 has-[:checked]:border-blue-500 cursor-pointer hover:bg-gray-100 transition-colors">
                                            <input type="radio" id="payment-stripe" name="payment_method" value="stripe"
                                                class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                            <div class="ml-3 flex justify-between items-center w-full">
                                                <span class="text-sm font-medium text-gray-900">Credit / Debit Card</span>
                                                <div class="flex space-x-1">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-500"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Z" /></svg>
                                                </div>
                                            </div>
                                        </label>
                                        
                                        <!-- GCash (E-Wallet) - DISABLED -->
                                        <label for="payment-gcash"
                                            class="flex items-center p-4 border border-gray-200 rounded-lg cursor-not-allowed opacity-50 bg-gray-50">
                                            <input type="radio" id="payment-gcash" name="payment_method" value="gcash"
                                                class="h-4 w-4 text-gray-400 border-gray-300" disabled>
                                            <div class="ml-3 flex justify-between items-center w-full">
                                                <span class="text-sm font-medium text-gray-500">GCash</span>
                                                <span class="text-[10px] font-bold uppercase tracking-wider text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full">Coming Soon</span>
                                            </div>
                                        </label>
                                        
                                        <!-- Bank Transfer - DISABLED -->
                                        <label for="payment-bank"
                                            class="flex items-center p-4 border border-gray-200 rounded-lg cursor-not-allowed opacity-50 bg-gray-50">
                                            <input type="radio" id="payment-bank" name="payment_method" value="bank"
                                                class="h-4 w-4 text-gray-400 border-gray-300" disabled>
                                            <div class="ml-3 flex justify-between items-center w-full">
                                                <span class="text-sm font-medium text-gray-500">Online Bank Transfer</span>
                                                <span class="text-[10px] font-bold uppercase tracking-wider text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full">Coming Soon</span>
                                            </div>
                                        </label>
                                    </div>
                                </div>

                                <!-- Submit Button -->
                                <div class="mt-8">
                                    <button id="topup-submit-btn" type="submit"
                                        class="w-full px-6 py-4 bg-blue-600 text-white text-lg font-medium rounded-xl shadow-sm hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                        disabled>
                                        Top Up Now
                                    </button>
                                </div>
                            </form>
                        </section>

                        <!-- Column 2: Current Balance -->
                        <section class="lg:col-span-1">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 sticky top-6">
                                <h3 class="text-lg font-bold text-gray-900 mb-6">Your Balance</h3>
                                
                                <div class="bg-gradient-to-br from-indigo-900 via-blue-900 to-violet-800 rounded-xl p-5 text-white shadow-md relative overflow-hidden mb-6">
                                    <div class="absolute -top-12 -right-12 w-32 h-32 bg-white opacity-10 rounded-full blur-xl"></div>
                                    <p class="text-[10px] uppercase tracking-widest text-indigo-200 mb-1 opacity-80 relative z-10">Current Balance</p>
                                    <p class="text-3xl font-bold tracking-tight relative z-10">
                                        ₱<span id="user-balance">0.00</span>
                                    </p>
                                </div>
                                
                                <div class="bg-gray-50 rounded-xl p-4 border border-gray-100 flex items-center justify-between">
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-600 mr-3">
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" /></svg>
                                        </div>
                                        <p class="text-sm font-medium text-gray-600">Loyalty Points</p>
                                    </div>
                                    <p class="text-lg font-bold text-gray-900">
                                        <span id="user-loyalty-points">0.00</span>
                                    </p>
                                </div>
                            </div>
                        </section>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Mobile menu logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mobileMenuBtn = document.getElementById('mobile-menu-button');
            const sidebar = document.getElementById('sidebar');

            if (mobileMenuBtn && sidebar) {
                mobileMenuBtn.addEventListener('click', () => {
                    sidebar.classList.toggle('-translate-x-full');
                });
            }
        });
    </script>

    <!-- Link to the external JavaScript files -->
    <script src="/assets/js/dashboard.js"></script>
    <script src="/assets/js/customer_topup.js"></script>
</body>

</html>
