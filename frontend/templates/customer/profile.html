<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayCard - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="/assets/style/tailwind.js"></script>
</head>

<body class="font-sans antialiased text-gray-900 bg-gray-100" data-username="{{.Username}}">

    <div class="flex h-screen bg-gray-100 overflow-hidden">
        <!-- Sidebar -->
        {{template "customer_sidebar" .}}

        <!-- Main Content Area -->
        <div id="main-content" class="flex-1 flex flex-col overflow-hidden transition-all duration-200 ease-in-out">
            <!-- Header -->
            <header
                class="flex items-center justify-between md:justify-end h-16 px-5 sm:px-6 py-4 bg-white border-b border-gray-200 z-20 shrink-0">
                <!-- Mobile Menu Button (Left) -->
                <div class="flex items-center md:hidden">
                    <button id="mobile-menu-button" class="text-gray-500 hover:text-gray-700 focus:outline-none">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <span class="ml-3 text-lg font-bold tracking-tight text-slate-900">Uni<span
                            class="text-violet-600">Card</span></span>
                </div>

                <!-- Profile Dropdown (Right) -->
                <div class="flex items-center">
                    <span class="mr-3 font-medium hidden md:flex items-center">Welcome, <span id="user-full-name" class="ml-1"><span class="inline-block h-4 w-24 bg-gray-200 animate-pulse rounded align-middle"></span></span></span>

                    <!-- PROFILE DROPDOWN -->
                    <div class="relative">
                        <button id="profile-avatar-button"
                            class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold cursor-pointer ring-2 ring-transparent hover:ring-blue-300 transition-all duration-150">
                            <span id="user-initials">U</span>
                        </button>

                        <!-- Dropdown Menu -->
                        <div id="profile-dropdown-menu"
                            class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-gray-200 z-50">
                            <div class="py-1">
                                <a href="/u/{{.Username}}"
                                    class="flex items-center px-4 py-2 text-sm text-blue-600 hover:bg-gray-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                        stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                                    </svg>
                                    <span class="ml-3">Profile</span>
                                </a>
                                <a href="/u/{{.Username}}/settings"
                                    class="flex items-center px-4 py-2 text-sm text-blue-600 hover:bg-gray-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                        stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" />
                                    </svg>
                                    <span class="ml-3">Settings</span>
                                </a>
                                <div class="border-t border-gray-100"></div>
                                <button id="profile-logout-button"
                                    class="w-full text-left flex items-center px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                        stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
                                    </svg>
                                    <span class="ml-3">Sign Out</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Page Content -->
            <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
                <div class="max-w-4xl mx-auto">
                    <!-- Page Title -->
                    <h1 class="text-3xl font-bold text-gray-900 mb-6">My Profile</h1>

                    <!-- Profile Content Grid -->
                    <div>

                        <!-- Column 1: Personal Information -->
                        <section class="space-y-6">
                            <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
                                <header class="flex justify-between items-center mb-6">
                                    <h2 class="text-2xl font-bold text-gray-900">Personal Information</h2>
                                    <button id="edit-profile-btn"
                                        class="text-sm font-medium text-blue-600 hover:text-blue-700 transition flex items-center bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg active:scale-[0.98]">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                            stroke-width="1.5" stroke="currentColor" class="w-4 h-4 mr-1.5">
                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                                        </svg>
                                        Edit
                                    </button>

                                    <div id="profile-edit-actions" class="hidden space-x-2">
                                        <button id="cancel-edit-btn"
                                            class="text-sm font-medium text-gray-600 hover:text-gray-900 px-4 py-2 rounded-lg hover:bg-gray-100 transition active:scale-[0.98]">
                                            Cancel
                                        </button>
                                        <button id="save-profile-btn"
                                            class="text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition flex items-center active:scale-[0.98]">
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                                stroke-width="1.5" stroke="currentColor" class="w-4 h-4 mr-1.5">
                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                    d="M4.5 12.75l6 6 9-13.5" />
                                            </svg>
                                            Save Changes
                                        </button>
                                    </div>
                                </header>

                                <!-- View Mode -->
                                <dl class="space-y-5" id="profile-details-view">
                                    <div class="flex flex-col sm:flex-row py-3 border-b border-gray-100">
                                        <dt class="w-full sm:w-1/3 text-sm font-medium text-gray-500">Full Name</dt>
                                        <dd class="w-full sm:w-2/3 mt-1 sm:mt-0 text-base font-medium text-gray-900"
                                            id="profile-view-name">
                                            <div class="h-5 bg-gray-200 rounded w-48 animate-pulse"></div>
                                        </dd>
                                    </div>
                                    <div class="flex flex-col sm:flex-row py-3">
                                        <dt class="w-full sm:w-1/3 text-sm font-medium text-gray-500">Username</dt>
                                        <dd class="w-full sm:w-2/3 mt-1 sm:mt-0 text-base font-medium text-gray-900"
                                            id="profile-view-username">
                                            <div class="h-5 bg-gray-200 rounded w-32 animate-pulse"></div>
                                        </dd>
                                    </div>
                                </dl>

                                <!-- Edit Mode -->
                                <form id="profile-details-edit" class="hidden space-y-5"
                                    onsubmit="event.preventDefault();">
                                    <div>
                                        <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full
                                            Name</label>
                                        <input type="text" name="full_name" id="full_name"
                                            class="w-full px-4 py-2.5 bg-gray-50 text-gray-500 border border-gray-200 rounded-lg cursor-not-allowed focus:outline-none"
                                            readonly>
                                    </div>
                                    <div>
                                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                                        <input type="text" name="username" id="username"
                                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors hover:bg-gray-100"
                                            required>
                                    </div>
                                </form>
                            </div>
                        </section>

                        <!-- Column 2: Contact Information -->
                        <section class="space-y-6 mt-6">
                            <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
                                <header class="flex justify-between items-center mb-6">
                                    <h2 class="text-2xl font-bold text-gray-900">Contact Information</h2>
                                    <button id="edit-contact-btn"
                                        class="text-sm font-medium text-blue-600 hover:text-blue-700 transition flex items-center bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg active:scale-[0.98]">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                            stroke-width="1.5" stroke="currentColor" class="w-4 h-4 mr-1.5">
                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                                        </svg>
                                        Edit
                                    </button>

                                    <div id="contact-edit-actions" class="hidden space-x-2">
                                        <button id="cancel-contact-edit-btn"
                                            class="text-sm font-medium text-gray-600 hover:text-gray-900 px-4 py-2 rounded-lg hover:bg-gray-100 transition active:scale-[0.98]">
                                            Cancel
                                        </button>
                                        <button id="save-contact-btn"
                                            class="text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition flex items-center active:scale-[0.98]">
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                                stroke-width="1.5" stroke="currentColor" class="w-4 h-4 mr-1.5">
                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                    d="M4.5 12.75l6 6 9-13.5" />
                                            </svg>
                                            Save Changes
                                        </button>
                                    </div>
                                </header>

                                <!-- View Mode -->
                                <dl class="space-y-5" id="contact-details-view">
                                    <div class="flex flex-col sm:flex-row py-3 border-b border-gray-100">
                                        <dt class="w-full sm:w-1/3 text-sm font-medium text-gray-500">Email Address</dt>
                                        <dd class="w-full sm:w-2/3 mt-1 sm:mt-0 text-base font-medium text-gray-900">
                                            <span id="profile-view-email"><div class="h-5 bg-gray-200 rounded w-48 animate-pulse"></div></span>
                                            <div id="pending-email-container" class="hidden mt-2 p-2 bg-yellow-50 border border-yellow-200 rounded-md">
                                                <p class="text-xs text-yellow-800 font-semibold mb-1">Pending Verification</p>
                                                <p class="text-sm text-yellow-900" id="profile-view-pending-email"></p>
                                            </div>
                                        </dd>
                                    </div>
                                    <div class="flex flex-col sm:flex-row py-3">
                                        <dt class="w-full sm:w-1/3 text-sm font-medium text-gray-500">Phone Number</dt>
                                        <dd class="w-full sm:w-2/3 mt-1 sm:mt-0 text-base font-medium text-gray-900"
                                            id="profile-view-phone">
                                            <div class="h-5 bg-gray-200 rounded w-32 animate-pulse"></div>
                                        </dd>
                                    </div>
                                </dl>

                                <!-- Edit Mode -->
                                <form id="contact-details-edit" class="hidden space-y-5"
                                    onsubmit="event.preventDefault();">
                                    <div>
                                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email
                                            Address</label>
                                        <input type="email" name="email" id="email"
                                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors hover:bg-gray-100"
                                            required>
                                    </div>
                                    <div>
                                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone
                                            Number</label>
                                        <input type="tel" name="phone" id="phone"
                                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors hover:bg-gray-100">
                                    </div>
                                </form>
                            </div>
                        </section>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Logout Confirmation Modal -->
    <div id="logout-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50 transition-opacity duration-300 ease-in-out opacity-0">
        <!-- Modal Content -->
        <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-lg border border-gray-100 transform transition-all duration-300 ease-in-out scale-95 opacity-0"
            id="logout-modal-content">
            <!-- Modal Header -->
            <div class="flex items-start justify-between">
                <h3 class="text-2xl font-bold text-gray-900">Confirm Logout</h3>
                <button id="modal-close-button" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <!-- Modal Body -->
            <div class="mt-4">
                <p class="text-base text-gray-600">
                    Are you sure you want to log out of your PayCard account?
                </p>
            </div>
            <!-- Modal Footer -->
            <div class="mt-6 flex justify-end space-x-4">
                <button id="modal-cancel-button"
                    class="px-6 py-2 text-base font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 active:scale-[0.98]">
                    Cancel
                </button>
                <button id="modal-confirm-logout-button"
                    class="px-6 py-2 text-base font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 active:scale-[0.98]">
                    Logout
                </button>
            </div>
        </div>
    </div>

    <script src="/assets/js/dashboard.js" defer></script>
    <script src="../../assets/js/profile.js" defer></script>
</body>

</html>
