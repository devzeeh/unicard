<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | UniCard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-white flex flex-col items-center justify-center min-h-screen px-4">
    <div class="text-center w-full max-w-2xl">
        <!--<img src="/assets/images/404_custom.png" alt="404 Error"
        class="w-full max-w-md mx-auto h-auto object-contain mb-10">-->

        <h1 class="text-5xl font-bold text-gray-800 mb-2">
            Sorry, the page you're looking for can't be found.
        </h1>
        <h2 class="text-gray-500 text-sm mb-8">
            This page doesn't exist.
        </h2>

        <button onclick="history.back()"
            class="inline-block px-8 py-3 bg-blue-700 text-white font-medium rounded-xl hover:bg-blue-800 transition-colors shadow-sm">
            Go Back
        </button>
    </div>
</body>

</html>
