<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Admin - Xendit Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <script src="/frontend/assets/style/tailwind.js"></script>
</head>
<body class="font-sans antialiased text-gray-900 bg-gray-50/50 relative overflow-hidden">
    <!-- Subtle Background Elements -->
    <div class="absolute top-0 left-0 w-full h-96 bg-gradient-to-b from-blue-50 to-transparent -z-10"></div>
    <div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full bg-blue-400/10 blur-[100px] pointer-events-none -z-10"></div>
    <div class="absolute bottom-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-purple-400/10 blur-[100px] pointer-events-none -z-10"></div>

    <div class="flex h-screen">
        <!-- Sidebar Navigation -->
        {{template "admin_sidebar" .}}

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="flex items-center justify-between h-20 px-8 bg-white/70 backdrop-blur-md border-b border-gray-200/50 sticky top-0 z-20">
                <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-700 tracking-tight">Xendit Transactions</h2>
                <div class="flex items-center space-x-4">
                    <div class="text-right hidden sm:block">
                        <span class="block font-semibold text-sm text-gray-900">Welcome, Super Admin</span>
                        <span class="block text-xs text-gray-500">Administrator</span>
                    </div>
                    <div class="w-11 h-11 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold ring-4 ring-blue-50 uppercase shadow-md transform hover:scale-105 transition-transform duration-200 cursor-pointer">
                        SA
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto p-8 relative">
                <div class="max-w-7xl mx-auto animate-fade-in-up">
                    <div class="mb-8">
                        <h1 class="text-3xl font-bold text-gray-900">Xendit Transactions</h1>
                        <p class="text-gray-500 mt-1">View all external API transactions</p>
                    </div>

                    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="p-6 border-b border-gray-200 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                            <!-- Search -->
                            <div class="relative w-full md:w-80">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                    <i class="fas fa-search text-gray-400"></i>
                                </span>
                                <input type="text" id="searchInput" placeholder="Search transactions..."
                                    class="w-full pl-10 pr-4 py-2 text-sm bg-gray-50 border border-gray-200 rounded-lg hover:bg-gray-100 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150" />
                            </div>
                            
                            <!-- Filters -->
                            <div class="flex items-center space-x-2 flex-wrap md:flex-nowrap gap-y-2 md:gap-y-0">
                                <label for="typeFilter" class="text-sm font-medium text-gray-700 sr-only">Type:</label>
                                <select id="typeFilter" class="bg-gray-50 border border-gray-200 rounded-lg hover:bg-gray-100 focus:bg-white text-sm px-3 py-2 focus:ring-blue-500 focus:border-blue-500 w-full md:w-auto transition duration-150">
                                    <option value="all">All Categories</option>
                                    <option value="payment">Payment</option>
                                    <option value="topup">Top-up</option>
                                    <option value="refund">Refund</option>
                                    <option value="reversal">Reversal</option>
                                </select>
                                
                                <label for="statusFilter" class="text-sm font-medium text-gray-700 sr-only">Status:</label>
                                <select id="statusFilter" class="bg-gray-50 border border-gray-200 rounded-lg hover:bg-gray-100 focus:bg-white text-sm px-3 py-2 focus:ring-blue-500 focus:border-blue-500 w-full md:w-auto transition duration-150">
                                    <option value="all">All Statuses</option>
                                    <option value="completed">Completed</option>
                                    <option value="pending">Pending</option>
                                    <option value="failed">Failed</option>
                                </select>
                                
                                <label for="sortFilter" class="text-sm font-medium text-gray-700 sr-only">Sort by:</label>
                                <select id="sortFilter" class="bg-gray-50 border border-gray-200 rounded-lg hover:bg-gray-100 focus:bg-white text-sm px-3 py-2 focus:ring-blue-500 focus:border-blue-500 w-full md:w-auto transition duration-150">
                                    <option value="newest">Newest to Oldest</option>
                                    <option value="oldest">Oldest to Newest</option>
                                    <option value="highest">Highest Amount</option>
                                    <option value="lowest">Lowest Amount</option>
                                </select>
                            </div>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="min-w-full table-fixed divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th scope="col" class="w-[15%] px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Date</th>
                                        <th scope="col" class="w-[20%] px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Description</th>
                                        <th scope="col" class="w-[10%] px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Type</th>
                                        <th scope="col" class="w-[15%] px-6 py-4 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Amount</th>
                                        <th scope="col" class="w-[15%] px-6 py-4 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="transactionsList" class="bg-white divide-y divide-gray-100">
                                    <tr class="animate-pulse">
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-24"></div><div class="h-3 bg-gray-100 rounded w-16 mt-2"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-3/4"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                                        <td class="px-6 py-4 text-right"><div class="h-4 bg-gray-200 rounded w-16 ml-auto"></div></td>
                                        <td class="px-6 py-4 text-right"><div class="h-6 bg-gray-200 rounded-full w-20 ml-auto"></div></td>
                                    </tr>
                                    <tr class="animate-pulse">
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-24"></div><div class="h-3 bg-gray-100 rounded w-16 mt-2"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-3/4"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                                        <td class="px-6 py-4 text-right"><div class="h-4 bg-gray-200 rounded w-16 ml-auto"></div></td>
                                        <td class="px-6 py-4 text-right"><div class="h-6 bg-gray-200 rounded-full w-20 ml-auto"></div></td>
                                    </tr>
                                    <tr class="animate-pulse">
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-24"></div><div class="h-3 bg-gray-100 rounded w-16 mt-2"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-3/4"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                                        <td class="px-6 py-4 text-right"><div class="h-4 bg-gray-200 rounded w-16 ml-auto"></div></td>
                                        <td class="px-6 py-4 text-right"><div class="h-6 bg-gray-200 rounded-full w-20 ml-auto"></div></td>
                                    </tr>
                                    <tr class="animate-pulse">
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-24"></div><div class="h-3 bg-gray-100 rounded w-16 mt-2"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-3/4"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                                        <td class="px-6 py-4 text-right"><div class="h-4 bg-gray-200 rounded w-16 ml-auto"></div></td>
                                        <td class="px-6 py-4 text-right"><div class="h-6 bg-gray-200 rounded-full w-20 ml-auto"></div></td>
                                    </tr>
                                    <tr class="animate-pulse">
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-24"></div><div class="h-3 bg-gray-100 rounded w-16 mt-2"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-3/4"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                                        <td class="px-6 py-4 text-right"><div class="h-4 bg-gray-200 rounded w-16 ml-auto"></div></td>
                                        <td class="px-6 py-4 text-right"><div class="h-6 bg-gray-200 rounded-full w-20 ml-auto"></div></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <!-- Transaction Details Modal -->
    <div id="txnModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="closeModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="flex items-center space-x-4 mb-4">
                        <div class="flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-blue-100">
                            <i class="fas fa-file-invoice-dollar text-blue-600"></i>
                        </div>
                        <div>
                            <h3 class="text-xl font-medium text-gray-900" id="modal-title">Transaction Details</h3>
                            <p id="modal-description" class="text-sm text-gray-500 mt-1"></p>
                        </div>
                    </div>
                    <div class="border-t border-gray-200 pt-4" id="modal-content">
                        <!-- Details will be injected here -->
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 flex flex-row-reverse">
                    <button type="button" class="w-full inline-flex justify-center rounded-lg bg-gray-50 border border-gray-200 shadow-sm px-4 py-2 text-base font-medium text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:ml-3 sm:w-auto sm:text-sm active:scale-[0.98] transition-all" onclick="closeModal()">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allTransactions = [];
        const validTransactionTypes = new Set(['payment','refund','reversal','topup','withdrawal']);
        const shouldShowAmount = (type) => typeof type === 'string' && validTransactionTypes.has(type.toLowerCase());

        function renderTable(transactions) {
            const tbody = document.getElementById('transactionsList');
            tbody.innerHTML = '';
            
            if (!transactions || transactions.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                            No transactions found
                        </td>
                    </tr>
                `;
                return;
            }
            
            transactions.forEach(txn => {
                const showAmount = shouldShowAmount(txn.type);
                const isNegative = (txn.type || '').toLowerCase() === 'payment';
                const amountColor = showAmount ? (isNegative ? 'text-red-600' : 'text-green-600') : '';
                const amountPrefix = isNegative ? '-₱' : '+₱';
                const amountStr = showAmount ? `${amountPrefix}${Math.abs(txn.amount).toFixed(2)}` : '';
                
                const dateObj = new Date(txn.date);
                const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                
                let timeStr = txn.time;
                try {
                    const [hours, minutes] = txn.time.split(':');
                    const h = parseInt(hours, 10);
                    const ampm = h >= 12 ? 'PM' : 'AM';
                    const formattedH = h % 12 || 12;
                    timeStr = `${formattedH.toString().padStart(2, '0')}:${minutes} ${ampm}`;
                } catch (e) {
                    console.error(e);
                }

                let statusBadgeClass = 'bg-green-100 text-green-800';
                if (txn.status.toLowerCase() === 'failed') {
                    statusBadgeClass = 'bg-red-100 text-red-800';
                } else if (txn.status.toLowerCase() === 'pending') {
                    statusBadgeClass = 'bg-yellow-100 text-yellow-800';
                }
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition-colors duration-150 cursor-pointer";
                tr.onclick = () => showModal(txn);
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-semibold text-gray-900">${formattedDate}</div>
                        <div class="text-xs text-gray-500 mt-1">${timeStr}</div>
                    </td>
                    <td class="px-6 py-4 max-w-0 overflow-hidden">
                        <div class="text-sm font-medium text-gray-900 truncate">${txn.description}</div>
                        <div class="text-xs text-gray-500 mt-1 truncate">ID: ${txn.transaction_id}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-600 capitalize">${txn.type}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        ${showAmount ? `<div class="text-sm font-semibold ${amountColor}">${amountStr}</div>` : ''}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full capitalize ${statusBadgeClass}">
                            ${txn.status}
                        </span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterAndSort() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const sortFilter = document.getElementById('sortFilter').value;

            let filtered = allTransactions.filter(txn => {
                const matchesQuery = txn.description.toLowerCase().includes(query) || 
                                     txn.transaction_id.toLowerCase().includes(query);
                const matchesType = typeFilter === 'all' || txn.type.toLowerCase() === typeFilter;
                const matchesStatus = statusFilter === 'all' || txn.status.toLowerCase() === statusFilter;
                return matchesQuery && matchesType && matchesStatus;
            });

            filtered.sort((a, b) => {
                if (sortFilter === 'newest') {
                    return new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time);
                } else if (sortFilter === 'oldest') {
                    return new Date(a.date + ' ' + a.time) - new Date(b.date + ' ' + b.time);
                } else if (sortFilter === 'highest') {
                    return Math.abs(b.amount) - Math.abs(a.amount);
                } else if (sortFilter === 'lowest') {
                    return Math.abs(a.amount) - Math.abs(b.amount);
                }
                return 0;
            });

            renderTable(filtered);
        }

        function showModal(txn) {
            const showAmount = shouldShowAmount(txn.type);
            const isNegative = (txn.type || '').toLowerCase() === 'payment';
            const amountColor = showAmount ? (isNegative ? 'text-red-600' : 'text-green-600') : '';
            const amountPrefix = isNegative ? '-₱' : '+₱';
            const amountStr = showAmount ? `${amountPrefix}${Math.abs(txn.amount).toFixed(2)}` : '';

            const dateObj = new Date(txn.date);
            const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            
            const content = document.getElementById('modal-content');
            document.getElementById('modal-description').textContent = txn.description;
            content.innerHTML = `
                <div class="space-y-3 text-sm">
                    <div class="flex justify-between border-b pb-2">
                        <span class="text-gray-500 font-medium">Transaction ID</span>
                        <span class="text-gray-900 font-mono">${txn.transaction_id}</span>
                    </div>
                    <div class="flex justify-between border-b pb-2">
                        <span class="text-gray-500 font-medium">Date & Time</span>
                        <span class="text-gray-900">${formattedDate} ${txn.time}</span>
                    </div>
                    <div class="flex justify-between border-b pb-2">
                        <span class="text-gray-500 font-medium">Type</span>
                        <span class="text-gray-900 capitalize">${txn.type}</span>
                    </div>
                    <div class="flex justify-between border-b pb-2">
                        <span class="text-gray-500 font-medium">Status</span>
                        <span class="text-gray-900 capitalize">${txn.status}</span>
                    </div>
                    ${showAmount ? `
                    <div class="flex justify-between pb-2">
                        <span class="text-gray-500 font-medium">Amount</span>
                        <span class="font-bold ${amountColor}">${amountStr}</span>
                    </div>
                    ` : ''}
                </div>
            `;
            document.getElementById('txnModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('txnModal').classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const username = '{{.Username}}';
            
            document.getElementById('searchInput').addEventListener('input', filterAndSort);
            document.getElementById('typeFilter').addEventListener('change', filterAndSort);
            document.getElementById('statusFilter').addEventListener('change', filterAndSort);
            document.getElementById('sortFilter').addEventListener('change', filterAndSort);

            fetch(`/v1/admin/${username}/xendit-transactions`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.transactions) {
                        allTransactions = data.transactions;
                        filterAndSort();
                    } else {
                        renderTable([]);
                    }
                })
                .catch(err => {
                    console.error('Error fetching transactions:', err);
                    document.getElementById('transactionsList').innerHTML = `
                        <tr>
                            <td colspan="5" class="px-6 py-8 text-center text-red-500">
                                Failed to load transactions. Please try again.
                            </td>
                        </tr>
                    `;
                });
        });
    </script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
    </style>
</body>
</html>
