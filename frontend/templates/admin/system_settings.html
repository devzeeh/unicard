<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Admin - System Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    }
                },
            },
        };
    </script>
    <style>
        .toggle-checkbox:checked { right: 0; border-color: #3b82f6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3b82f6; }
    </style>
</head>
<body class="font-sans antialiased text-gray-900 bg-gray-100">
    <div class="flex h-screen bg-gray-100">
        <!-- Sidebar Navigation -->
        {{template "admin_sidebar" .}}

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="flex items-center justify-between h-16 px-8 py-4 bg-white border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">System Settings</h2>
                <div class="flex items-center">
                    <span class="mr-3 font-medium text-sm text-gray-600">Welcome, Super Admin</span>
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold ring-2 ring-blue-100">
                        SA
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-8">
                <div class="max-w-4xl mx-auto space-y-8">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900">Core Application Rules</h1>
                        <p class="text-gray-500 mt-1">Modify global application limits, fees, and gateway APIs.</p>
                    </div>

                    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold text-gray-900 mb-6 border-b pb-2"><i class="fas fa-money-bill-wave text-gray-400 mr-2"></i> Global Fees & Limits</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Global Top-Up Convenience Fee (₱)</label>
                                <input type="number" value="15.00" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Minimum Balance Requirement (₱)</label>
                                <input type="number" value="100.00" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200">
                        <h3 class="text-lg font-bold text-gray-900 mb-6 border-b pb-2"><i class="fas fa-network-wired text-gray-400 mr-2"></i> Transaction APIs</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Primary Payment Gateway URL</label>
                                <input type="url" value="https://api.unicard-gateway.ph/v2/process" class="w-full px-4 py-2 font-mono text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Hardware Sync Endpoint</label>
                                <input type="url" value="wss://sync.unicard-hardware.ph/stream" class="w-full px-4 py-2 font-mono text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-4 pb-12">
                        <button class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-6 py-2 rounded-lg font-medium transition duration-150">Discard</button>
                        <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium shadow-sm transition duration-150">Save Settings</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
