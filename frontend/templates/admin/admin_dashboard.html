<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/frontend/assets/style/tailwind.js"></script>
</head>

<body class="font-sans antialiased text-gray-900 bg-gray-100">
    <div class="flex h-screen bg-gray-100">
        <!-- Sidebar Navigation -->
        {{template "admin_sidebar" .}}

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Navbar -->
            <header class="flex items-center justify-between h-16 px-8 py-4 bg-white border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">Dashboard</h2>
                <div class="flex items-center">
                    <span class="mr-3 font-medium text-sm text-gray-600">Welcome, Admin</span>
                    <div
                        class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold ring-2 ring-blue-100">
                        A
                    </div>
                </div>
            </header>

            <!-- Main Scrollable Content -->
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-8">
                <div class="max-w-7xl mx-auto space-y-8">
                    <!-- Statistics Cards -->
                    <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <!-- Revenue Card -->
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <p class="text-sm font-medium text-gray-500 mb-2">Gross Revenue</p>
                                    <p class="text-2xl font-bold text-gray-900" id="grossRevenue">₱0.00</p>
                                </div>
                                <div>
                                    <p class="text-sm font-medium text-gray-500 mb-2">Net Revenue</p>
                                    <p class="text-2xl font-bold text-emerald-600" id="netRevenue">₱0.00</p>
                                </div>
                            </div>
                        </div>

                        <!-- Users & Cards Card -->
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <p class="text-sm font-medium text-gray-500 mb-2">Total Users</p>
                                    <p class="text-2xl font-bold text-gray-900" id="totalUsers">0</p>
                                </div>
                                <div>
                                    <p class="text-sm font-medium text-gray-500 mb-2">Total Cards</p>
                                    <p class="text-2xl font-bold text-gray-900" id="totalCards">0</p>
                                </div>
                            </div>
                        </div>

                        <!-- Merchants & Terminals Card -->
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <p class="text-sm font-medium text-gray-500 mb-2">Active Merchants</p>
                                    <p class="text-2xl font-bold text-gray-900" id="activeMerchants">0</p>
                                </div>
                                <div>
                                    <p class="text-sm font-medium text-gray-500 mb-2">Active Terminals</p>
                                    <p class="text-2xl font-bold text-gray-900" id="activeTerminals">0</p>
                                </div>
                            </div>
                        </div>
                    </section>



                    <!-- Merchants Table -->
                    <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <div class="flex items-center justify-between mb-4 border-b pb-2">
                            <h3 class="text-lg font-bold text-gray-900">Registered Merchants</h3>
                            <a href="/admin/{{.Username}}/merchants"
                                class="text-sm font-medium text-blue-600 hover:text-blue-800 flex items-center transition duration-150">
                                View All <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                                </svg>
                            </a>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full table-fixed text-left border-collapse">
                                <thead>
                                    <tr class="bg-gray-50 border-b border-gray-200 text-sm text-gray-600">
                                        <th class="p-3 font-semibold">Merchant</th>
                                        <th class="p-3 font-semibold">Business Type</th>
                                        <th class="p-3 font-semibold">Owner/Contact</th>
                                        <th class="p-3 font-semibold">Phone</th>
                                        <th class="p-3 font-semibold">Status</th>
                                        <th class="p-3 font-semibold">Created At</th>
                                    </tr>
                                </thead>
                                <tbody id="merchantsTableBody" class="text-sm text-gray-700 divide-y divide-gray-100">
                                    <!-- Dynamic Rows -->
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/admin/admin_dashboard.js?"></script>
</body>

</html>
