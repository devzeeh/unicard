<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Simulation - UniCard</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Terminal Simulator</h1>
            <p class="text-slate-500 mt-2">Test card taps, fare deductions, and retail payments without physical hardware.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Simulation Form -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 h-fit">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H7a3 3 0 00-3 3v8a3 3 0 003 3z" />
                    </svg>
                    Simulate Tap
                </h2>
                <form id="simForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Card Number (RFID/NFC ID)</label>
                        <input type="text" id="cardNumber" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="e.g. 1234567890">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Select Merchant</label>
                        <select id="merchantId" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition bg-white">
                            <option value="" disabled>Select a merchant</option>
                            {{range .Merchants}}
                            <option value="{{.ID}}" {{if eq .Name "mhissy transport"}}selected{{end}}>{{.Name}}</option>
                            {{end}}
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Transaction Type</label>
                        <div class="flex space-x-4">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="type" value="Fare" checked class="peer sr-only">
                                <div class="p-3 text-center border border-slate-300 rounded-lg peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 hover:bg-slate-50 transition">
                                    <span class="font-medium text-sm">Fare (Transport)</span>
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="type" value="Payment Store" class="peer sr-only">
                                <div class="p-3 text-center border border-slate-300 rounded-lg peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 hover:bg-slate-50 transition">
                                    <span class="font-medium text-sm">Retail Payment</span>
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="type" value="Refund" class="peer sr-only">
                                <div class="p-3 text-center border border-slate-300 rounded-lg peer-checked:bg-amber-50 peer-checked:border-amber-500 peer-checked:text-amber-700 hover:bg-slate-50 transition">
                                    <span class="font-medium text-sm">Refund</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Amount</label>
                        <div class="relative">
                            <span class="absolute left-3 top-2.5 text-slate-500">₱</span>
                            <input type="number" id="amount" step="0.01" min="0.01" required class="w-full pl-8 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="0.00">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-lg shadow transition flex justify-center items-center">
                        <span>Process Scan</span>
                    </button>
                    
                    <div id="simMessage" class="hidden text-sm rounded-lg p-3 text-center"></div>
                </form>
            </div>

            <!-- Recent Activity Table -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h2 class="text-xl font-semibold text-slate-800">Session Activity</h2>
                    <span class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full font-medium" id="activityCount">0 transactions</span>
                </div>
                <div class="p-0 flex-1 overflow-auto bg-white" style="max-height: 400px;">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-slate-50 sticky top-0 border-b border-slate-200 text-slate-500">
                            <tr>
                                <th class="px-6 py-3 font-medium">Time</th>
                                <th class="px-6 py-3 font-medium">Type</th>
                                <th class="px-6 py-3 font-medium text-right">Amount</th>
                                <th class="px-6 py-3 font-medium text-right">Fee</th>
                                <th class="px-6 py-3 font-medium text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="activityTable" class="divide-y divide-slate-100">
                            <!-- Rows go here -->
                        </tbody>
                    </table>
                    <div id="emptyState" class="p-8 text-center text-slate-400 flex flex-col items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3 text-slate-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <p>No transactions yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="/assets/js/terminal_sim.js"></script>
</body>
</html>
