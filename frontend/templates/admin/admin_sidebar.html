<!-- Logout Confirmation Modal (Injected with Sidebar) -->
<div id="logout-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50 transition-opacity duration-300 ease-in-out opacity-0">
    <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-lg border border-gray-100 transform transition-all duration-300 ease-in-out scale-95 opacity-0" id="logout-modal-content">
        <div class="flex items-start justify-between">
            <h3 class="text-2xl font-bold text-gray-900">Confirm Logout</h3>
            <button id="modal-close-button" class="text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="mt-4"><p class="text-base text-gray-600">Are you sure you want to log out of your account?</p></div>
        <div class="mt-6 flex justify-end space-x-4">
            <button id="modal-cancel-button" class="px-6 py-2 text-base font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 active:scale-[0.98]">Cancel</button>
            <button id="modal-confirm-logout-button" class="px-6 py-2 text-base font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 active:scale-[0.98]">Logout</button>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const logoutBtn = document.getElementById('logout-button');
        const modal = document.getElementById('logout-modal');
        const modalContent = document.getElementById('logout-modal-content');
        const closeBtn = document.getElementById('modal-close-button');
        const cancelBtn = document.getElementById('modal-cancel-button');
        const confirmBtn = document.getElementById('modal-confirm-logout-button');

        if (logoutBtn && modal) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modal.classList.add('opacity-100');
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                }, 10);
            });

            const closeModal = () => {
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                modal.classList.remove('opacity-100');
                modal.classList.add('opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            };

            if (closeBtn) closeBtn.addEventListener('click', closeModal);
            if (cancelBtn) cancelBtn.addEventListener('click', closeModal);
            if (confirmBtn) {
                confirmBtn.addEventListener('click', () => {
                    window.location.href = "/logout";
                });
            }
        }
    });
</script>
{{end}}
