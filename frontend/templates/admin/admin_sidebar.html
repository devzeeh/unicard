{{define "admin_sidebar"}} <!-- this is a built-in template to be injected into the admin dashboard using Go's html/template package-->
<aside id="sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between hidden md:flex">
    <div>
        <!-- Logo / Title -->
        <div class="flex items-center px-6 py-5 border-b border-gray-200">
            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H7a3 3 0 00-3 3v8a3 3 0 003 3z">
                </path>
            </svg>
            <span class="ml-3 text-xl font-bold text-gray-900">UniCard</span>
        </div>

        <!-- Navigation Links -->
        <nav class="mt-6 px-4 pb-4 overflow-y-auto" style="max-height: calc(100vh - 160px);">
            <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Core System</p>
            <ul class="space-y-1">
                <li>
                    <a href="/admin/{{.Username}}"
                        class="flex items-center px-4 py-3 text-sm font-medium {{if eq .Page "dashboard"}}text-white bg-blue-600 shadow-sm{{else}}text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition duration-150{{end}} rounded-lg">
                        <svg class="w-5 h-5 mr-3 {{if ne .Page "dashboard"}}text-gray-400{{end}}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                            </path>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/{{.Username}}/merchants"
                        class="flex items-center px-4 py-3 text-sm font-medium {{if eq .Page "merchants"}}text-white bg-blue-600 shadow-sm{{else}}text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition duration-150{{end}} rounded-lg">
                        <svg class="w-5 h-5 mr-3 {{if ne .Page "merchants"}}text-gray-400{{end}}" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 21V10l-7-5-7 5v11m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                            </path>
                        </svg>
                        <span>Merchants</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/{{.Username}}/terminals"
                        class="flex items-center px-4 py-3 text-sm font-medium {{if eq .Page "terminals"}}text-white bg-blue-600 shadow-sm{{else}}text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition duration-150{{end}} rounded-lg">
                        <svg class="w-5 h-5 mr-3 {{if ne .Page "terminals"}}text-gray-400{{end}}" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z">
                            </path>
                        </svg>
                        <span>Terminals</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/{{.Username}}/transactions"
                        class="flex items-center px-4 py-3 text-sm font-medium {{if eq .Page "transactions"}}text-white bg-blue-600 shadow-sm{{else}}text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition duration-150{{end}} rounded-lg">
                        <svg class="w-5 h-5 mr-3 {{if ne .Page "transactions"}}text-gray-400{{end}}" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span>Transactions</span>
                    </a>
                </li>
            </ul>

            <p
                class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-6 border-t pt-4">
                Legacy Operations</p>
            <ul class="space-y-1">
                <!-- Card Inventory -->
                <li>
                    <a href="/admin/{{.Username}}/card-inventory"
                        class="flex items-center px-4 py-3 text-sm font-medium {{if eq .Page "card-inventory"}}text-white bg-blue-600 shadow-sm{{else}}text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition duration-150{{end}} rounded-lg">
                        <svg class="w-5 h-5 mr-3 {{if ne .Page "card-inventory"}}text-gray-400{{end}}" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                        </svg>
                        <span>Card Inventory</span>
                    </a>
                </li>
                <!-- Add Card -->
                <li>
                    <a href="/admin/{{.Username}}/addcard"
                        class="flex items-center px-4 py-3 text-sm font-medium {{if eq .Page "addcard"}}text-white bg-blue-600 shadow-sm{{else}}text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition duration-150{{end}} rounded-lg">
                        <svg class="w-5 h-5 mr-3 {{if ne .Page "addcard"}}text-gray-400{{end}}" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>Add Card</span>
                    </a>
                </li>
                <!-- Deactivate Card -->
                <li>
                    <a href="/admin/{{.Username}}/deactivatecard"
                        class="flex items-center px-4 py-3 text-sm font-medium {{if eq .Page "deactivatecard"}}text-white bg-blue-600 shadow-sm{{else}}text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition duration-150{{end}} rounded-lg">
                        <svg class="w-5 h-5 mr-3 {{if ne .Page "deactivatecard"}}text-gray-400{{end}}" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636">
                            </path>
                        </svg>
                        <span>Deactivate Card</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Logout Link -->
    <div class="p-4 border-t border-gray-200">
        <a href="/logout"
            class="flex items-center px-4 py-3 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition duration-150">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                </path>
            </svg>
            <span>Logout</span>
        </a>
    </div>
</aside>
{{end}}
