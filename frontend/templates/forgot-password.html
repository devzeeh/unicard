<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayCard - Forgot Password</title>
    <!-- 1. Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. Load Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- 3. Load Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="/frontend/static/style.css" />

    <!-- 4. Configure Tailwind to use Inter font -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>

    
</head>

<body class="font-sans antialiased text-gray-900">
    <!-- Main Container -->
    <main class="flex items-center justify-center min-h-screen p-4">
        <!-- Forgot Password Card -->
        <section class="w-full max-w-md bg-white p-8 md:p-10 rounded-xl shadow-xl border border-gray-200">
            <!-- Header -->
            <header class="text-center">
                <!-- Lock Icon -->
                <svg class="w-16 h-16 mx-auto text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <!-- This is the corrected path -->
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>

                <h1 id="form-title" class="text-3xl font-bold text-gray-900 mt-4">Forgot Password?</h1>
                <p id="form-subtitle" class="text-gray-600 mt-1">Enter your email to get a reset link.</p>
            </header>

            <!-- Form -->
            <form id="forgot-form" class="mt-8 space-y-6" action="#" method="POST">
                
                <!-- Step 1: Email Input -->
                <div id="email-step">
                    <div class="required">
                        <label for="email" class="block text-sm font-medium text-black">
                            Email address
                        </label>
                        <div class="mt-1 relative">
                            <!-- Icon -->
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                <i class="fas fa-envelope text-gray-400"></i>
                            </span>
                            <!-- Input -->
                            <input id="email" name="email" type="email" autocomplete="email"
                                placeholder="you@example.com" required
                                class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out text-sm" />
                        </div>
                    </div>

                    <!-- Reset Button -->
                    <div class="mt-6"> <!-- Added margin-top -->
                        <button id="send-link-btn" type="submit"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700 transition duration-150 ease-in-out">
                            Send Reset Link
                        </button>
                    </div>
                </div>

                <!-- Step 2: OTP Input (Hidden by default) -->
                <div id="otp-step" class="hidden">
                    <div class="required">
                        <label for="otp" class="block text-sm font-medium text-black">
                            OTP Code
                        </label>
                        <div class="mt-1 relative">
                            <!-- Icon -->
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                <i class="fas fa-key text-gray-400"></i>
                            </span>
                            <!-- Input -->
                            <input id="otp" name="otp" type="text"
                                placeholder="Check your email for the code" required
                                class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out text-sm" />
                        </div>
                    </div>

                    <!-- Confirm OTP Button -->
                    <div class="mt-6"> <!-- Added margin-top -->
                        <button id="confirm-otp-btn" type="submit"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-green-600 hover:bg-green-700 transition duration-150 ease-in-out">
                            Confirm Code & Reset
                        </button>
                    </div>
                </div>

            </form>

            <!-- Links area wrapped in <footer> -->
            <footer class="mt-5">
                <div class="border-t border-gray-300 my-4"></div>

                <!-- Back to Login Link -->
                <div class="text-center">
                    <p class="text-sm text-gray-600">
                        Remember your password?
                        <a href="/login" class="font-medium text-blue-600 hover:text-blue-500">
                            Back to Login
                        </a>
                    </p>
                </div>
            </footer>
        </section>
    </main>

    <!-- Load the page-specific JavaScript -->
    <script src="../static/javascript/forgot-password.js" defer></script>
</body>

</html>
