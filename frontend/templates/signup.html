<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayCard - Create Account</title>
    <!-- 1. Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. Load Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- 3. Load Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- 4. Load Custom Stylesheet -->
    <link rel="stylesheet" href="/assets/style/style.css" />
    <link rel="stylesheet" href="/assets/style/password-valid.css" />

    <!-- 5. Configure Tailwind to use Inter font -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>
</head>

<body class="font-sans antialiased text-gray-900">
    <!-- Main Container -->
    <main class="flex items-center justify-center min-h-screen p-4">
        <!-- Flex Container for Two Columns -->
        <div
            class="flex flex-col lg:flex-row w-full max-w-5xl rounded-xl shadow-xl border border-gray-200 bg-white overflow-hidden">

            <!-- Right Column: Sign Up Form Section -->
            <section class="w-full lg:w-1/2 p-8 md:p-10">
                <!-- Header -->
                <header class="text-center">
                    <!-- User Plus Icon <svg class="w-16 h-16 mx-auto text-blue-600" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z">
                        </path>
                    </svg>-->

                    <h1 class="text-3xl font-bold text-gray-900 mt-4">Create your account</h1>
                    <p id="step-subtitle" class="text-gray-600 mt-1">Step 1 of 3: Your Details</p>
                </header>

                <!-- Error Message Area -->
                <div id="error-message" class="hidden text-sm text-red-600 text-center bg-red-100 p-3 rounded-lg mt-4">
                </div>

                <!-- Form -->
                <form id="signup-form" class="mt-8" action="/signupauth" method="POST">

                    <!-- ==== STEP 1: Name and Email ==== -->
                    <section id="step-1" class="space-y-4">
                        <!-- Name Input -->
                        <div class="required">
                            <label for="first_name" class="block text-sm font-medium text-black">
                                First Name
                            </label>
                            <div class="mt-1 relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                    <i class="fas fa-user text-gray-400"></i>
                                </span>
                                <input id="first_name" name="first_name" type="text" autocomplete="name" required
                                    class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" />
                            </div>

                            <label for="last_name" class="block text-sm font-medium text-black">
                                Last Name
                            </label>
                            <div class="mt-1 relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                    <i class="fas fa-user text-gray-400"></i>
                                </span>
                                <input id="last_name" name="last_name" type="text" autocomplete="name" required
                                    class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" />
                            </div>
                        </div>

                        <!-- Email Input -->
                        <div class="required">
                            <label for="email" class="block text-sm font-medium text-black">
                                Email address
                            </label>
                            <div class="mt-1 relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                    <i class="fas fa-envelope text-gray-400"></i>
                                </span>
                                <input id="email" name="email" type="email" autocomplete="email" required
                                    placeholder="you@example.com"
                                    class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" />
                            </div>
                        </div>

                        <!-- Contact Number Input -->
                        <div class="required">
                            <label for="contact_number" class="block text-sm font-medium text-black">
                                Contact Number
                            </label>
                            <div class="mt-1 relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                    <i class="fas fa-phone text-gray-400"></i>
                                </span>
                                <input id="contact_number" name="contact_number" type="tel" autocomplete="tel" required
                                    placeholder="Enter 11-digit phone number"
                                    class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" />
                            </div>
                        </div>

                        <!-- Step 1 Button -->
                        <div class="pt-2">
                            <button id="btn-step-1" type="button"
                                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700 transition duration-150 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed"
                                disabled>
                                Next
                            </button>
                        </div>
                    </section>

                    <!-- ==== STEP 2: Card ID ==== -->
                    <section id="step-2" class="space-y-4 step-hidden">
                        <!-- Card ID Input -->
                        <div class="required">
                            <label for="card_id" class="block text-sm font-medium text-black">
                                Card ID Number
                            </label>
                            <div class="mt-1 relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                    <i class="fas fa-credit-card text-gray-400"></i>
                                </span>
                                <input id="card_id" name="card_id" type="text" autocomplete="off" required
                                    placeholder="Enter the 10-digit number on your card"
                                    class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" />
                            </div>
                            <!-- Real-time error message for Card ID -->
                            <div id="card-id-error" class="text-xs text-red-600 mt-1 hidden"></div>
                        </div>

                        <!-- Step 2 Navigation -->
                        <div class="pt-2 grid grid-cols-2 gap-4">
                            <button id="btn-back-2" type="button"
                                class="w-full flex justify-center py-3 px-4 border border-gray-300 rounded-lg shadow-sm text-base font-medium text-gray-700 bg-white hover:bg-gray-50 transition duration-150 ease-in-out">
                                Back
                            </button>
                            <button id="btn-step-2" type="button"
                                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700 transition duration-150 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed"
                                disabled>
                                Next
                            </button>
                        </div>
                    </section>

                    <!-- ==== STEP 3: Password ==== -->
                    <section id="step-3" class="space-y-4 step-hidden">
                        <!-- Password Input -->
                        <div class="required">
                            <label for="password" class="block text-sm font-medium text-black">
                                Password
                            </label>
                            <div class="mt-1 relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                    <i class="fas fa-lock text-gray-400"></i>
                                </span>
                                <input id="password" name="password" type="password" autocomplete="new-password"
                                    required
                                    class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" />
                            </div>
                        </div>

                        <!-- Confirm Password Input -->
                        <div class="required">
                            <label for="confirm_password" class="block text-sm font-medium text-black">
                                Confirm Password
                            </label>
                            <div class="mt-1 relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                    <i class="fas fa-lock text-gray-400"></i>
                                </span>
                                <input id="confirm_password" name="confirm_password" type="password"
                                    autocomplete="new-password" required
                                    class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" />
                            </div>
                        </div>

                        <!-- Validation Checklist (Simplified) -->
                        <div id="validation-checklist" class="pt-2 space-y-1.5">
                            <div id="length-check" class="validation-item">
                                <i class="icon fas fa-times-circle text-red-500"></i>
                                <span>At least 8 characters</span>
                            </div>
                            <div id="match-check" class="validation-item">
                                <i class="icon fas fa-times-circle text-red-500"></i>
                                <span>Passwords match</span>
                            </div>
                        </div>

                        <!-- Step 3 Navigation -->
                        <div class="pt-2 grid grid-cols-2 gap-4">
                            <button id="btn-back-3" type="button"
                                class="w-full flex justify-center py-3 px-4 border border-gray-300 rounded-lg shadow-sm text-base font-medium text-gray-700 bg-white hover:bg-gray-50 transition duration-150 ease-in-out">
                                Back
                            </button>
                            <button id="create-account-btn" type="submit"
                                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700 transition duration-150 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed"
                                disabled>
                                Create Account
                            </button>
                        </div>
                    </section>
                </form>

                <!-- Divider -->
                <div class="relative mt-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">
                            or
                        </span>
                    </div>
                </div>


                <!-- Back to Login Link -->
                <footer class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        Already have an account?
                        <a href="/login" class="font-medium text-blue-600 hover:text-blue-500">
                            Sign in
                        </a>
                    </p>
                </footer>
            </section>

            <!-- Left Column: Image Section (Hidden on small screens, shown on large) -->
            <div class="lg:w-1/2 p-8 bg-blue-600 flex items-center justify-center hidden lg:flex">
                <div class="text-center text-white">
                    <h2 class="text-3xl font-bold mb-4">Welcome to PayCard!</h2>
                    <p class="text-lg mb-6">Create your account
                        now!.<!--secure account and manage your finances effortlessly.--></p>
                    <img src="https://placeholderimage.org/api/image/400x300/3664ce/ffffff?text=PayCard"
                        alt="Secure transactions with credit card"
                        class="max-w-full h-auto mx-auto rounded-lg shadow-md">
                </div>
            </div>
        </div>
    </main>

    <!-- ==== SUCCESS MODAL (ADDED) ==== -->
    <div id="success-modal"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50 hidden">
        <!-- Modal Content -->
        <div class="w-full max-w-sm bg-white p-8 rounded-xl shadow-xl text-center">
            <!-- Check Icon -->
            <div class="w-16 h-16 mx-auto bg-green-100 rounded-full flex items-center justify-center">
                <i class="fas fa-check text-4xl text-green-600"></i>
            </div>

            <h2 class="text-2xl font-bold text-gray-900 mt-5">Account Created!</h2>
            <p class="text-gray-600 mt-2">
                Your account has been successfully created.
            </p>

            <!-- Go to Login Button -->
            <button id="modal-close-btn" type="button"
                class="w-full flex justify-center py-3 px-4 mt-6 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700 transition duration-150  ease-in-out">
                Go to Login
            </button>
        </div>
    </div>
    <!-- ==== END OF MODAL ==== -->

    <!-- Load the validation script for this page -->
    <script src="/assets/js/signup.js" defer></script>
</body>

</html>
