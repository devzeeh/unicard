<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayCard - Reset Password</title>
    <!-- 1. Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. Load Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- 3. Load Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- 4. Load Custom Stylesheet -->
    <link rel="stylesheet" href="/frontend/static/style.css" />
    <link rel="stylesheet" href="../static/css/passwordvalid.css" />
 
    <!-- 5. Configure Tailwind to use Inter font -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>    
</head>

<body class="font-sans antialiased text-gray-900">
    <!-- Main Container -->
    <main class="flex items-center justify-center min-h-screen p-4">
        <!-- Reset Password Card -->
        <section class="w-full max-w-md bg-white p-8 md:p-10 rounded-xl shadow-xl border border-gray-200">
            <!-- Header -->
            <header class="text-center">
                <!-- Lock Icon -->
                <svg class="w-16 h-16 mx-auto text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>

                <h1 class="text-3xl font-bold text-gray-900 mt-4">Set New Password</h1>
                <p class="text-gray-600 mt-1">Please create a new, secure password.</p>
            </header>

            <!-- Form -->
            <form id="reset-form" class="mt-8 space-y-4" action="#" method="POST">

                <!-- New Password Input -->
                <div class="required">
                    <label for="new_password" class="block text-sm font-medium text-black">
                        New Password
                    </label>
                    <div class="mt-1 relative">
                        <!-- Icon -->
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                            <i class="fas fa-lock text-gray-400"></i>
                        </span>
                        <input id="new_password" name="new_password" type="password" autocomplete="new-password" required
                            class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" />
                    </div>
                </div>

                <!-- Confirm New Password Input -->
                <div class="required">
                    <label for="confirm_password" class="block text-sm font-medium text-black">
                        Confirm New Password
                    </label>
                    <div class="mt-1 relative">
                        <!-- Icon -->
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                            <i class="fas fa-lock text-gray-400"></i>
                        </span>
                        <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password"
                            required
                            class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" />
                    </div>
                </div>

                <!-- Validation Checklist (Added) -->
                <div id="validation-checklist" class="pt-2 space-y-1.5 hidden">
                    <div id="length-check" class="validation-item">
                        <i class="icon fas fa-times-circle text-red-500"></i>
                        <span>At least 8 characters</span>
                    </div>
                    <div id="case-check" class="validation-item">
                        <i class="icon fas fa-times-circle text-red-500"></i>
                        <span>One uppercase & lowercase letter</span>
                    </div>
                    <div id="num-check" class="validation-item">
                        <i class="icon fas fa-times-circle text-red-500"></i>
                        <span>One number (0-9)</span>
                    </div>
                    <div id="match-check" class="validation-item">
                        <i class="icon fas fa-times-circle text-red-500"></i>
                        <span>Passwords match</span>
                    </div>
                </div>

                <!-- Error Message Area -->
                <div id="error-message" class="hidden text-sm text-red-600 text-center"></div>


                <!-- Reset Button -->
                <div class="pt-2">
                    <button id="reset-submit-btn" type="submit"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700 transition duration-150 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed"
                        disabled>
                        Set New Password
                    </button>
                </div>
            </form>

            <!-- Back to Login Link -->
            <footer class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Remember your password?
                    <a href="/login" class="font-medium text-blue-600 hover:text-blue-500">
                        Back to Login
                    </a>
                </p>
            </footer>
        </section>
    </main>

    <!-- Load the validation script for this page -->
    <script src="/frontend/static/javascript/reset-password.js" defer></script>
</body>

</html>
