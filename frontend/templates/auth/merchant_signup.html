<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merchant Sign Up - UniCard</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/assets/style/tailwind.js"></script>

    <!-- Load Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Load Custom Stylesheet -->
    <link rel="stylesheet" href="/assets/style/style.css" />
</head>
<body class="font-sans antialiased text-gray-900 bg-gray-50">
    <main class="flex items-center justify-center min-h-screen p-4 py-12">
        <section class="w-full max-w-3xl bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mx-auto">
            <div class="p-8 md:p-10">
                <!-- Header -->
                <header class="text-center mb-8">
                    <svg class="w-16 h-16 mx-auto text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                    <h1 class="text-3xl font-bold text-gray-900 mt-4">Become a Merchant</h1>
                    <p class="text-gray-600 mt-1">Create your business account to start accepting payments.</p>
                </header>

                <div id="formAlert" class="hidden mb-6 p-4 rounded-lg text-sm font-medium text-center"></div>

                <form id="merchantSignupForm" class="space-y-8">
                    
                    <!-- Business Information -->
                    <div>
                        <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider mb-4 border-b pb-2">Business Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label for="businessName" class="block text-sm font-medium text-gray-700 mb-1.5">Business Name <span class="text-red-500">*</span></label>
                                <input type="text" id="businessName" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 outline-none hover:bg-gray-100 focus:bg-white">
                            </div>
                            <div>
                                <label for="businessType" class="block text-sm font-medium text-gray-700 mb-1.5">Business Type <span class="text-red-500">*</span></label>
                                <select id="businessType" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 outline-none appearance-none hover:bg-gray-100 focus:bg-white">
                                    <option value="" disabled selected>Select industry...</option>
                                    <option value="retail">Retail</option>
                                    <option value="transportation">Transportation</option>
                                    <option value="food_and_beverage">Food & Beverage</option>
                                    <option value="services">Services</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="md:col-span-2">
                                <label for="businessAddress" class="block text-sm font-medium text-gray-700 mb-1.5">Business Address <span class="text-red-500">*</span></label>
                                <input type="text" id="businessAddress" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 outline-none hover:bg-gray-100 focus:bg-white">
                            </div>
                        </div>
                    </div>

                    <!-- Contact & Account Details -->
                    <div>
                        <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider mb-4 border-b pb-2">Account Details</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label for="ownerName" class="block text-sm font-medium text-gray-700 mb-1.5">Owner's Full Name <span class="text-red-500">*</span></label>
                                <input type="text" id="ownerName" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 outline-none hover:bg-gray-100 focus:bg-white">
                            </div>
                            <div>
                                <label for="businessPhone" class="block text-sm font-medium text-gray-700 mb-1.5">Business Phone <span class="text-red-500">*</span></label>
                                <input type="tel" id="businessPhone" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 outline-none hover:bg-gray-100 focus:bg-white">
                            </div>
                            <div class="md:col-span-2">
                                <label for="businessEmail" class="block text-sm font-medium text-gray-700 mb-1.5">Business Email <span class="text-red-500">*</span></label>
                                <input type="email" id="businessEmail" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 outline-none hover:bg-gray-100 focus:bg-white">
                            </div>
                            <div>
                                <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password <span class="text-red-500">*</span></label>
                                <input type="password" id="password" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 outline-none hover:bg-gray-100 focus:bg-white">
                            </div>
                            <div>
                                <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1.5">Confirm Password <span class="text-red-500">*</span></label>
                                <input type="password" id="confirmPassword" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-gray-900 outline-none hover:bg-gray-100 focus:bg-white">
                            </div>
                        </div>
                    </div>

                    <!-- Required Documents -->
                    <div>
                        <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider mb-4 border-b pb-2">Verification Documents</h3>
                        <p class="text-xs text-gray-500 mb-4">Please upload valid registration documents to speed up your approval process.</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label for="businessDocument" class="block text-sm font-medium text-gray-700 mb-1.5">Business Registration (DTI/SEC) <span class="text-red-500">*</span></label>
                                <input type="file" id="businessDocument" required accept=".pdf,.jpg,.jpeg,.png" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                            </div>
                            <div>
                                <label for="birDocument" class="block text-sm font-medium text-gray-700 mb-1.5">BIR Document <span class="text-red-500">*</span></label>
                                <input type="file" id="birDocument" required accept=".pdf,.jpg,.jpeg,.png" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                            </div>
                            <div class="md:col-span-2">
                                <label for="otherDocument" class="block text-sm font-medium text-gray-700 mb-1.5">Owner Valid ID (Optional)</label>
                                <input type="file" id="otherDocument" accept=".pdf,.jpg,.jpeg,.png" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 cursor-pointer">
                            </div>
                        </div>
                    </div>
                    
                    <div class="pt-4">
                        <button type="submit" id="submitBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg text-base font-medium text-white bg-blue-600 hover:bg-blue-700 transition duration-150 ease-in-out active:scale-[0.98]">
                            Submit Application
                        </button>
                    </div>
                    
                    <div class="text-center mt-6">
                        <p class="text-sm text-gray-600">
                            Already have an account? 
                            <a href="/login" class="font-medium text-blue-600 hover:text-blue-500">Log in here</a>
                        </p>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- Merchant Signup Logic -->
    <script src="/assets/js/merchant_signup.js"></script>
</body>
</html>
