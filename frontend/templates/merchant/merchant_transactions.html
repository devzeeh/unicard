<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merchant - Transactions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/frontend/assets/style/tailwind.js"></script>
</head>

<body class="font-sans antialiased text-gray-900 bg-gray-100">
    <div class="flex h-screen bg-gray-100">
        <!-- Sidebar Navigation -->
        {{template "merchant_sidebar" .}}

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Navbar -->
            <header class="flex items-center justify-between h-16 px-8 py-4 bg-white border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">Transactions</h2>
                <div class="flex items-center">
                    <span class="mr-3 font-medium text-sm text-gray-600">Welcome, {{.Username}}</span>
                    <div
                        class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center text-white font-bold ring-2 ring-green-100 uppercase">
                        {{printf "%.1s" .Username}}
                    </div>
                </div>
            </header>

            <!-- Main Scrollable Content -->
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-8">
                <div class="max-w-7xl mx-auto space-y-8">

                    <!-- Transactions Table -->
                    <section class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="p-6">
                            <h3 class="text-lg font-bold text-gray-900">All Transactions</h3>
                        </div>
                        <div class="overflow-x-auto border-t border-gray-200">
                            <table class="min-w-full divide-y divide-gray-200 text-left">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Transaction ID</th>
                                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Amount</th>
                                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Date</th>
                                    </tr>
                                </thead>
                                <tbody id="transactionsTableBody" class="bg-white divide-y divide-gray-200">
                                    <tr class="animate-pulse">
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-3/4"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                                        <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-full w-20"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-24"></div></td>
                                    </tr>
                                    <tr class="animate-pulse">
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-3/4"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                                        <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-full w-20"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-24"></div></td>
                                    </tr>
                                    <tr class="animate-pulse">
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-3/4"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                                        <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-full w-20"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-24"></div></td>
                                    </tr>
                                    <tr class="animate-pulse">
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-3/4"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                                        <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-full w-20"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-24"></div></td>
                                    </tr>
                                    <tr class="animate-pulse">
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-3/4"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                                        <td class="px-6 py-4"><div class="h-6 bg-gray-200 rounded-full w-20"></div></td>
                                        <td class="px-6 py-4"><div class="h-4 bg-gray-200 rounded w-24"></div></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>
</body>

</html>
