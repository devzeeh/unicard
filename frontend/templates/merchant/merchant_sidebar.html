{{define "merchant_sidebar"}}
<aside id="sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between hidden md:flex">
    <div>
        <!-- Logo / Title -->
        <div class="flex items-center px-6 py-5 border-b border-gray-200">
            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H7a3 3 0 00-3 3v8a3 3 0 003 3z">
                </path>
            </svg>
            <span class="ml-3 text-xl font-bold text-gray-900">UniCard</span>
        </div>

        <!-- Navigation Links -->
        <nav class="mt-6 px-4 pb-4 overflow-y-auto" style="max-height: calc(100vh - 160px);">
            <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Merchant Panel</p>
            <ul class="space-y-1">
                <li>
                    <a href="/merchant/{{.Username}}/dashboard"
                        class="flex items-center px-4 py-3 text-sm font-medium {{if eq .Page "dashboard"}}text-white bg-blue-600 shadow-sm{{else}}text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition duration-150{{end}} rounded-lg">
                        <svg class="w-5 h-5 mr-3 {{if ne .Page "dashboard"}}text-gray-400{{end}}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                            </path>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="/merchant/{{.Username}}/incomes"
                        class="flex items-center px-4 py-3 text-sm font-medium {{if eq .Page "incomes"}}text-white bg-blue-600 shadow-sm{{else}}text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition duration-150{{end}} rounded-lg">
                        <svg class="w-5 h-5 mr-3 {{if ne .Page "incomes"}}text-gray-400{{end}}" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                            </path>
                        </svg>
                        <span>Incomes</span>
                    </a>
                </li>
                <li>
                    <a href="/merchant/{{.Username}}/transactions"
                        class="flex items-center px-4 py-3 text-sm font-medium {{if eq .Page "transactions"}}text-white bg-blue-600 shadow-sm{{else}}text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition duration-150{{end}} rounded-lg">
                        <svg class="w-5 h-5 mr-3 {{if ne .Page "transactions"}}text-gray-400{{end}}" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span>Transactions</span>
                    </a>
                </li>
                <li>
                    <a href="/merchant/{{.Username}}/account"
                        class="flex items-center px-4 py-3 text-sm font-medium {{if eq .Page "account"}}text-white bg-blue-600 shadow-sm{{else}}text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition duration-150{{end}} rounded-lg">
                        <svg class="w-5 h-5 mr-3 {{if ne .Page "account"}}text-gray-400{{end}}" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z">
                            </path>
                        </svg>
                        <span>Account</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Logout Link -->
    <div class="p-4 border-t border-gray-200">
        <a href="/logout"
            class="flex items-center px-4 py-3 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition duration-150">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                </path>
            </svg>
            <span>Logout</span>
        </a>
    </div>
</aside>
{{end}}
