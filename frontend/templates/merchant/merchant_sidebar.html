{{define "merchant_sidebar"}}
<aside id="sidebar" class="w-64 bg-white border-r border-gray-100 flex flex-col h-screen sticky top-0 shadow-sm relative z-10 transition-all duration-300 hidden md:flex overflow-y-auto">
    <!-- Logo / Title -->
    <div class="flex-shrink-0 flex items-center px-6 py-5 border-b border-gray-100 sticky top-0 bg-white z-20">
        <div class="w-8 h-8 rounded-lg bg-gray-900 flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H7a3 3 0 00-3 3v8a3 3 0 003 3z">
                    </path>
                </svg>
            </div>
            <span class="ml-3 text-xl font-bold text-gray-900 tracking-tight">UniCard</span>
        </div>

    <!-- Navigation Links -->
    <nav class="mt-6 px-3 pb-4 space-y-1">
        <p class="px-3 text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-2">Merchant Panel</p>
            
            <a href="/merchant/{{.Username}}/dashboard"
                class="group flex items-center px-3 py-2 text-sm font-medium {{if eq .Page "dashboard"}}bg-blue-50 text-blue-700{{else}}text-gray-600 hover:bg-gray-50 hover:text-gray-900{{end}} rounded-lg transition-colors">
                <svg class="w-5 h-5 mr-3 {{if eq .Page "dashboard"}}text-blue-700{{else}}text-gray-400 group-hover:text-gray-600{{end}} transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span>Dashboard</span>
            </a>
            
            <a href="/merchant/{{.Username}}/transactions"
                class="group flex items-center px-3 py-2 text-sm font-medium {{if eq .Page "transactions"}}bg-blue-50 text-blue-700{{else}}text-gray-600 hover:bg-gray-50 hover:text-gray-900{{end}} rounded-lg transition-colors">
                <svg class="w-5 h-5 mr-3 {{if eq .Page "transactions"}}text-blue-700{{else}}text-gray-400 group-hover:text-gray-600{{end}} transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span>Transactions</span>
            </a>
            
            <a href="/merchant/{{.Username}}/account"
                class="group flex items-center px-3 py-2 text-sm font-medium {{if eq .Page "account"}}bg-blue-50 text-blue-700{{else}}text-gray-600 hover:bg-gray-50 hover:text-gray-900{{end}} rounded-lg transition-colors">
                <svg class="w-5 h-5 mr-3 {{if eq .Page "account"}}text-blue-700{{else}}text-gray-400 group-hover:text-gray-600{{end}} transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                <span>Account</span>
            </a>
        </nav>
    <!-- We replaced the closing div that was around the logo and nav -->

    <!-- Logout Link -->
    <div class="p-3 border-t border-gray-100 sticky bottom-0 bg-white z-20">
        <button id="logout-button"
            class="group w-full flex items-center px-3 py-2 text-sm font-medium text-red-600 hover:text-red-700 hover:bg-red-50 rounded-lg transition-colors">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            <span>Logout</span>
        </button>
    </div>
</aside>

<!-- Logout Confirmation Modal (Injected with Sidebar) -->
<div id="logout-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50 transition-opacity duration-300 ease-in-out opacity-0">
    <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-lg border border-gray-100 transform transition-all duration-300 ease-in-out scale-95 opacity-0" id="logout-modal-content">
        <div class="flex items-start justify-between">
            <h3 class="text-2xl font-bold text-gray-900">Confirm Logout</h3>
            <button id="modal-close-button" class="text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="mt-4"><p class="text-base text-gray-600">Are you sure you want to log out of your account?</p></div>
        <div class="mt-6 flex justify-end space-x-4">
            <button id="modal-cancel-button" class="px-6 py-2 text-base font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 active:scale-[0.98]">Cancel</button>
            <button id="modal-confirm-logout-button" class="px-6 py-2 text-base font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 active:scale-[0.98]">Logout</button>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const logoutBtn = document.getElementById('logout-button');
        const modal = document.getElementById('logout-modal');
        const modalContent = document.getElementById('logout-modal-content');
        const closeBtn = document.getElementById('modal-close-button');
        const cancelBtn = document.getElementById('modal-cancel-button');
        const confirmBtn = document.getElementById('modal-confirm-logout-button');

        if (logoutBtn && modal) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modal.classList.add('opacity-100');
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                }, 10);
            });

            const closeModal = () => {
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                modal.classList.remove('opacity-100');
                modal.classList.add('opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            };

            if (closeBtn) closeBtn.addEventListener('click', closeModal);
            if (cancelBtn) cancelBtn.addEventListener('click', closeModal);
            if (confirmBtn) {
                confirmBtn.addEventListener('click', () => {
                    window.location.href = "/logout";
                });
            }
        }
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!window.CURRENT_USERNAME) return;
        try {
            // Fetch user profile via JSON API to populate header, replacing SSR
            const res = await fetch(`/v1/merchant/${window.CURRENT_USERNAME}/account`);
            const json = await res.json();
            if (json.success && json.data) {
                // Use business_email if available, fallback to username
                const displayName = json.data.business_details?.business_email || window.CURRENT_USERNAME;
                
                // Update header elements
                const headerNames = document.querySelectorAll(".merchant-header-username");
                const headerInits = document.querySelectorAll(".merchant-header-initial");
                
                headerNames.forEach(el => el.textContent = displayName);
                headerInits.forEach(el => el.textContent = displayName.charAt(0).toUpperCase());
            }
        } catch (e) {
            console.error("Failed to fetch merchant profile for header", e);
        }
    });
</script>
{{end}}
