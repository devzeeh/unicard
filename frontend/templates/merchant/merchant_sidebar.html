{{define "merchant_sidebar"}}
<aside id="sidebar" class="w-64 bg-white/80 backdrop-blur-xl border-r border-gray-200/50 flex flex-col justify-between hidden md:flex shadow-[4px_0_24px_rgba(0,0,0,0.02)] relative z-10 transition-all duration-300">
    <div>
        <!-- Logo / Title -->
        <div class="flex items-center px-8 py-6 border-b border-gray-100">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30 transform hover:scale-105 transition-transform duration-300">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H7a3 3 0 00-3 3v8a3 3 0 003 3z">
                    </path>
                </svg>
            </div>
            <span class="ml-4 text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 tracking-tight">UniCard</span>
        </div>

        <!-- Navigation Links -->
        <nav class="mt-8 px-4 pb-4 overflow-y-auto" style="max-height: calc(100vh - 160px);">
            <p class="px-4 text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-3">Merchant Panel</p>
            <ul class="space-y-2">
                <li>
                    <a href="/merchant/{{.Username}}/dashboard"
                        class="group flex items-center px-4 py-3.5 text-sm font-semibold {{if eq .Page "dashboard"}}text-white bg-gradient-to-r from-blue-600 to-indigo-600 shadow-lg shadow-blue-500/25 transform scale-[1.02]{{else}}text-gray-600 hover:bg-gray-50/80 hover:text-gray-900 hover:scale-[1.01]{{end}} rounded-xl transition-all duration-300 active:scale-[0.98]">
                        <svg class="w-5 h-5 mr-3 {{if eq .Page "dashboard"}}text-white{{else}}text-gray-400 group-hover:text-blue-500{{end}} transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                            </path>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="/merchant/{{.Username}}/transactions"
                        class="group flex items-center px-4 py-3.5 text-sm font-semibold {{if eq .Page "transactions"}}text-white bg-gradient-to-r from-blue-600 to-indigo-600 shadow-lg shadow-blue-500/25 transform scale-[1.02]{{else}}text-gray-600 hover:bg-gray-50/80 hover:text-gray-900 hover:scale-[1.01]{{end}} rounded-xl transition-all duration-300 active:scale-[0.98]">
                        <svg class="w-5 h-5 mr-3 {{if eq .Page "transactions"}}text-white{{else}}text-gray-400 group-hover:text-purple-500{{end}} transition-colors duration-300" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span>Transactions</span>
                    </a>
                </li>
                <li>
                    <a href="/merchant/{{.Username}}/account"
                        class="group flex items-center px-4 py-3.5 text-sm font-semibold {{if eq .Page "account"}}text-white bg-gradient-to-r from-blue-600 to-indigo-600 shadow-lg shadow-blue-500/25 transform scale-[1.02]{{else}}text-gray-600 hover:bg-gray-50/80 hover:text-gray-900 hover:scale-[1.01]{{end}} rounded-xl transition-all duration-300 active:scale-[0.98]">
                        <svg class="w-5 h-5 mr-3 {{if eq .Page "account"}}text-white{{else}}text-gray-400 group-hover:text-blue-500{{end}} transition-colors duration-300" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z">
                            </path>
                        </svg>
                        <span>Account</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Logout Link -->
    <div class="p-6 border-t border-gray-100/50 bg-gray-50/30">
        <a href="/logout"
            class="group flex items-center justify-center px-4 py-3 text-sm font-bold text-red-500 hover:text-white bg-red-50 hover:bg-red-500 rounded-xl transition-all duration-300 shadow-sm hover:shadow-red-500/30 active:scale-[0.98]">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                </path>
            </svg>
            <span>Logout</span>
        </a>
    </div>
</aside>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!window.CURRENT_USERNAME) return;
        try {
            // Fetch user profile via JSON API to populate header, replacing SSR
            const res = await fetch(`/v1/merchant/${window.CURRENT_USERNAME}/account`);
            const json = await res.json();
            if (json.success && json.data) {
                // Use business_email if available, fallback to username
                const displayName = json.data.business_details?.business_email || window.CURRENT_USERNAME;
                
                // Update header elements
                const headerNames = document.querySelectorAll(".merchant-header-username");
                const headerInits = document.querySelectorAll(".merchant-header-initial");
                
                headerNames.forEach(el => el.textContent = displayName);
                headerInits.forEach(el => el.textContent = displayName.charAt(0).toUpperCase());
            }
        } catch (e) {
            console.error("Failed to fetch merchant profile for header", e);
        }
    });
</script>
{{end}}
