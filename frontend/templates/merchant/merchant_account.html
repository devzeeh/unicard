<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merchant - Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/frontend/assets/style/tailwind.js"></script>
</head>

<body class="font-sans antialiased text-gray-900 bg-gray-100">
    <div class="flex h-screen bg-gray-100">
        <!-- Sidebar Navigation -->
        {{template "merchant_sidebar" .}}

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Navbar -->
            <header class="flex items-center justify-between h-16 px-8 py-4 bg-white border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">Account Profile</h2>
                <div class="flex items-center">
                    <span class="mr-3 font-medium text-sm text-gray-600">Welcome, {{.Username}}</span>
                    <div
                        class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center text-white font-bold ring-2 ring-green-100 uppercase">
                        {{printf "%.1s" .Username}}
                    </div>
                </div>
            </header>

            <!-- Main Scrollable Content -->
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-8">
                <div class="max-w-4xl mx-auto space-y-8">
                    <!-- Account Settings Form -->
                    <section class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="p-6 border-b border-gray-100">
                            <h3 class="text-lg font-bold text-gray-900">Business Information</h3>
                            <p class="text-sm text-gray-500 mt-1">Manage your merchant account settings.</p>
                        </div>
                        <div class="p-6 space-y-6">
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Business Name</label>
                                    <div class="animate-pulse h-10 bg-gray-200 rounded w-full"></div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Business Type</label>
                                    <div class="animate-pulse h-10 bg-gray-200 rounded w-full"></div>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                                <div class="animate-pulse h-10 bg-gray-200 rounded w-full"></div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                                <div class="animate-pulse h-10 bg-gray-200 rounded w-full"></div>
                            </div>

                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>
</body>

</html>
